# Nginx configuration for server environment (pre-production/staging)

user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss;

    # Caching
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=http_cache:10m 
                     max_size=50m inactive=30m use_temp_path=off;

    server {
        listen 80 default_server;
        server_name _;

        client_max_body_size 100M;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ================= DEV ENVIRONMENT =================

        location /dev/ {
            proxy_pass http://172.17.0.1:8081/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept-Encoding "";

            sub_filter_once off;
            sub_filter 'src="/assets/' 'src="/dev/assets/';
            sub_filter 'href="/assets/' 'href="/dev/assets/';
            sub_filter 'href="/img/' 'href="/dev/img/';
            sub_filter 'src="/img/' 'src="/dev/img/';
        }

        location /dev/assets/ {
            proxy_pass http://172.17.0.1:8081/assets/;
            access_log off;
        }

        location /dev/img/ {
            proxy_pass http://172.17.0.1:8081/img/;
            access_log off;
        }

        location /dev/admin/ {
            proxy_pass http://172.17.0.1:8081/admin/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Accept-Encoding "";

            sub_filter_once off;
            sub_filter 'src="/assets/' 'src="/dev/admin/assets/';
            sub_filter 'href="/assets/' 'href="/dev/admin/assets/';
            sub_filter 'src="/admin/img/' 'src="/dev/admin/img/';
            sub_filter 'href="/admin/img/' 'href="/dev/admin/img/';
        }

        location /dev/admin/assets/ {
            proxy_pass http://172.17.0.1:8081/admin/assets/;
            access_log off;
        }

        location /dev/admin/img/ {
            proxy_pass http://172.17.0.1:8081/admin/img/;
            access_log off;
        }

        # ================= PRODUCTION ENVIRONMENT =================

        # Frontend
        location / {
            proxy_pass http://frontend:3000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Static assets caching
            location ~ \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
                proxy_cache http_cache;
                proxy_cache_valid 200 7d;
                add_header Cache-Control "public, max-age=604800, immutable";
                add_header X-Cache-Status $upstream_cache_status;
                access_log off;
            }
        }

        # Admin dashboard
        location /admin/ {
            proxy_pass http://admin:3001/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Static assets in admin
            location ~ ^/admin/.*\.(js|css|png|jpg|jpeg|gif|ico)$ {
                proxy_cache http_cache;
                proxy_cache_valid 200 7d;
                add_header Cache-Control "public, max-age=604800, immutable";
                add_header X-Cache-Status $upstream_cache_status;
                access_log off;
            }
        }

        # API backend
        location /api/ {
            proxy_pass http://backend:8080/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # API caching for GET requests
            proxy_cache http_cache;
            proxy_cache_methods GET HEAD;
            proxy_cache_valid 200 5m;
            add_header X-Cache-Status $upstream_cache_status;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        # Health check
        location /healthz {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Deny access to backup files
        location ~ \.(bak|config|sql|fla|psd|ini|log|sh|inc|swp)$ {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}