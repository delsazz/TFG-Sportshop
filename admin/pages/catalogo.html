<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Panel Admin Sportshop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/catalogo.css">
</head>
<body class="bg-gray-50 flex min-h-screen">
    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col fixed inset-y-0">
        <div class="p-6 border-b border-gray-700">
            <a href="index.html" class="flex items-center gap-3">
                <span class="flex h-10 w-24 items-center justify-center rounded-xl bg-white px-2">
                    <img src="img/campusfp.png" alt="CampusFP" class="max-h-8 w-full object-contain">
                </span>
                <span class="font-bold">Panel Admin</span>
            </a>
        </div>
        <nav class="flex-1 p-4 space-y-1">
            <a href="index.html" class="nav-link text-gray-300 hover:bg-gray-800 block px-4 py-2 rounded transition-colors">Dashboard</a>
            <a href="pedidos.html" class="nav-link text-gray-300 hover:bg-gray-800 block px-4 py-2 rounded transition-colors">Pedidos</a>
            <a href="pagos.html" class="nav-link text-gray-300 hover:bg-gray-800 block px-4 py-2 rounded transition-colors">Pagos</a>
            <a href="alumnos.html" class="nav-link text-gray-300 hover:bg-gray-800 block px-4 py-2 rounded transition-colors">Alumnos</a>
            <a href="catalogo.html" class="nav-link bg-blue-600 text-white block px-4 py-2 rounded transition-colors">Catálogo</a>
            <a href="kits.html" class="nav-link text-gray-300 hover:bg-gray-800 block px-4 py-2 rounded transition-colors">Kits</a>
            <a href="categorias.html" class="nav-link text-gray-300 hover:bg-gray-800 block px-4 py-2 rounded transition-colors">Categorías</a>
            <a href="inventario.html" class="nav-link text-gray-300 hover:bg-gray-800 block px-4 py-2 rounded transition-colors">Inventario</a>
            <a href="reportes.html" class="nav-link text-gray-300 hover:bg-gray-800 block px-4 py-2 rounded transition-colors">Reportes</a>
            <a href="devoluciones.html" class="nav-link text-gray-300 hover:bg-gray-800 block px-4 py-2 rounded transition-colors">Devoluciones</a>
            <a href="analisis.html" class="nav-link text-gray-300 hover:bg-gray-800 block px-4 py-2 rounded transition-colors">Análisis</a>
        </nav>
        <div class="p-4 border-t border-gray-700 text-sm text-gray-500">CampusFP Uniformes</div>
    </aside>

    <div class="flex-1 flex flex-col ml-64">
        <header class="bg-white border-b border-gray-200 px-8 py-4 flex justify-between items-center sticky top-0 z-10">
            <h1 class="text-lg font-semibold text-gray-800">Administración</h1>
            <button id="logoutBtn" class="text-sm text-gray-500 hover:text-gray-700">Cerrar sesión</button>
        </header>

        <main class="flex-1 p-8">
            <div class="space-y-6">
                <div class="flex flex-col gap-2 md:flex-row md:items-end md:justify-between">
                    <div>
                        <h2 class="text-2xl font-bold text-gray-900">Gestión del catálogo</h2>
                        <p class="text-sm text-gray-500">Crea, edita y elimina productos del escaparate.</p>
                    </div>
                    <div class="flex flex-col gap-2 sm:flex-row">
                        <button id="btnExportCsv" class="rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">Exportar stock</button>
                        <button id="btnNewProduct" class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700">+ Nuevo producto</button>
                    </div>
                </div>

                <div id="alertContainer"></div>

                <!-- Formulario (Hidden by default) -->
                <form id="productForm" class="hidden space-y-4 rounded-xl border border-gray-200 bg-white p-6 shadow-sm">
                    <h3 id="formTitle" class="text-lg font-semibold text-gray-900">Crear nuevo producto</h3>
                    <input type="hidden" id="editingId">
                    
                    <div class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
                            <input id="formNombre" class="w-full rounded-lg border border-gray-300 px-3 py-2" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Tipo de prenda</label>
                            <input id="formTipo" class="w-full rounded-lg border border-gray-300 px-3 py-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Color</label>
                            <input id="formColor" class="w-full rounded-lg border border-gray-300 px-3 py-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Precio (€) *</label>
                            <input id="formPrecio" type="number" step="0.01" class="w-full rounded-lg border border-gray-300 px-3 py-2" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Categoría *</label>
                            <select id="formCategoria" class="w-full rounded-lg border border-gray-300 px-3 py-2" required></select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Stock general</label>
                            <input id="formStock" type="number" class="w-full rounded-lg border border-gray-300 px-3 py-2" required>
                        </div>
                    </div>

                    <div class="flex gap-3 pt-4 border-t">
                        <button type="submit" class="flex-1 rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700">Guardar</button>
                        <button type="button" id="btnCancel" class="flex-1 rounded-lg border border-gray-300 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">Cancelar</button>
                    </div>
                </form>

                <!-- Filtros -->
                <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:flex-wrap">
                    <input id="filterNombre" type="text" placeholder="Buscar por nombre..." class="rounded-lg border border-gray-300 px-3 py-2 text-sm sm:flex-1">
                    <select id="filterCategoria" class="rounded-lg border border-gray-300 px-3 py-2 text-sm sm:w-48">
                        <option value="">Todas las categorías</option>
                    </select>
                </div>

                <!-- Tabla -->
                <div class="overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm">
                    <table class="min-w-full text-left">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-sm font-medium text-gray-500">Producto</th>
                                <th class="px-4 py-3 text-sm font-medium text-gray-500">Categoría</th>
                                <th class="px-4 py-3 text-sm font-medium text-gray-500">Precio</th>
                                <th class="px-4 py-3 text-sm font-medium text-gray-500">Stock</th>
                                <th class="px-4 py-3 text-sm font-medium text-gray-500">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="catalogBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="js/catalogo.js"></script>
    <script type="module" src="js/layout.js"></script>
</body>
</html>
