<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - Panel Admin Sportshop</title>
<link rel="stylesheet" href="../css/inventario.css">
</head>
<body class="bg-gray-50 flex min-h-screen">
    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col fixed inset-y-0">
        <div class="p-6 border-b border-gray-700">
            <a href="inicio.html" class="flex items-center gap-3">
                <span class="flex h-10 w-24 items-center justify-center rounded-xl bg-white px-2">
                    <img src="img/campusfp.png" alt="CampusFP" class="max-h-8 w-full object-contain">
                </span>
                <span class="font-bold">Panel Admin</span>
            </a>
        </div>
        <nav class="flex-1 p-4 space-y-1">
            <a href="inicio.html" class="nav-link text-gray-300 hover:bg-gray-800 block px-4 py-2 rounded transition-colors">Dashboard</a>
            <a href="pedidos.html" class="nav-link text-gray-300 hover:bg-gray-800 block px-4 py-2 rounded transition-colors">Pedidos</a>
            <a href="pagos.html" class="nav-link text-gray-300 hover:bg-gray-800 block px-4 py-2 rounded transition-colors">Pagos</a>
            <a href="alumnos.html" class="nav-link text-gray-300 hover:bg-gray-800 block px-4 py-2 rounded transition-colors">Alumnos</a>
            <a href="catalogo.html" class="nav-link text-gray-300 hover:bg-gray-800 block px-4 py-2 rounded transition-colors">Catálogo</a>
            <a href="kits.html" class="nav-link text-gray-300 hover:bg-gray-800 block px-4 py-2 rounded transition-colors">Kits</a>
            <a href="categorias.html" class="nav-link text-gray-300 hover:bg-gray-800 block px-4 py-2 rounded transition-colors">Categorías</a>
            <a href="inventario.html" class="nav-link bg-blue-600 text-white block px-4 py-2 rounded transition-colors">Inventario</a>
            <a href="reportes.html" class="nav-link text-gray-300 hover:bg-gray-800 block px-4 py-2 rounded transition-colors">Reportes</a>
            <a href="devoluciones.html" class="nav-link text-gray-300 hover:bg-gray-800 block px-4 py-2 rounded transition-colors">Devoluciones</a>
            <a href="analisis.html" class="nav-link text-gray-300 hover:bg-gray-800 block px-4 py-2 rounded transition-colors">Análisis</a>
        </nav>
        <div class="p-4 border-t border-gray-700 text-sm text-gray-500">CampusFP Uniformes</div>
    </aside>

    <div class="flex-1 flex flex-col ml-64">
        <header class="bg-white border-b border-gray-200 px-8 py-4 flex justify-between items-center sticky top-0 z-10">
            <h1 class="text-lg font-semibold text-gray-800">Administración</h1>
            <button id="logoutBtn" class="text-sm text-gray-500 hover:text-gray-700">Cerrar sesión</button>
        </header>

        <main class="flex-1 p-8">
            <div class="space-y-6">
                <div>
                    <h2 class="text-3xl font-bold text-gray-900">Inventario</h2>
                    <p class="mt-1 text-sm text-gray-600">Gestión del stock de productos.</p>
                </div>

                <!-- Resumen -->
                <div class="grid grid-cols-1 gap-4 md:grid-cols-3">
                    <div class="rounded-xl border border-blue-200 bg-blue-50 p-6">
                        <p class="text-sm font-medium text-blue-700">Total en Stock</p>
                        <p id="totalStock" class="mt-2 text-3xl font-bold text-blue-900">0</p>
                    </div>
                    <div class="rounded-xl border border-amber-200 bg-amber-50 p-6">
                        <p class="text-sm font-medium text-amber-700">Stock Bajo (&lt;5)</p>
                        <p id="lowStock" class="mt-2 text-3xl font-bold text-amber-900">0</p>
                    </div>
                    <div class="rounded-xl border border-red-200 bg-red-50 p-6">
                        <p class="text-sm font-medium text-red-700">Sin Stock</p>
                        <p id="noStock" class="mt-2 text-3xl font-bold text-red-900">0</p>
                    </div>
                </div>

                <!-- Filtros -->
                <div class="grid grid-cols-1 gap-4 md:grid-cols-3">
                    <input id="filterNombre" type="text" placeholder="Buscar producto..." class="rounded-lg border border-gray-300 px-3 py-2 text-sm">
                    <select id="filterCategoria" class="rounded-lg border border-gray-300 px-3 py-2 text-sm">
                        <option value="">Todas las categorías</option>
                    </select>
                    <select id="filterEstado" class="rounded-lg border border-gray-300 px-3 py-2 text-sm">
                        <option value="todos">Todos los productos</option>
                        <option value="bajo">Stock bajo</option>
                        <option value="sin">Sin stock</option>
                    </select>
                </div>

                <!-- Tabla -->
                <div class="overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-50 border-b border-gray-200">
                            <tr>
                                <th class="px-6 py-3 text-left font-semibold text-gray-700">Producto</th>
                                <th class="px-6 py-3 text-left font-semibold text-gray-700">Categoría</th>
                                <th class="px-6 py-3 text-left font-semibold text-gray-700">Precio</th>
                                <th class="px-6 py-3 text-right font-semibold text-gray-700">Stock</th>
                                <th class="px-6 py-3 text-center font-semibold text-gray-700">Estado</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryBody" class="divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="/js/script_inventario.js"></script>
    <script type="module" src="/js/script_estructura.js"></script>
</body>
</html>
