<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi perfil - Panel Admin Sportshop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <main class="mx-auto max-w-4xl px-4 py-8">
        <div class="mb-6 flex items-center justify-between">
            <div>
                <p class="text-sm font-semibold uppercase tracking-widest text-blue-700">Panel admin</p>
                <h1 class="text-3xl font-bold text-gray-900">Mi perfil</h1>
            </div>
            <a href="index.html" class="rounded-md border border-gray-300 px-3 py-2 text-sm font-semibold text-gray-700 hover:bg-white">Volver</a>
        </div>

        <section class="rounded-lg border border-gray-200 bg-white p-6 shadow-sm">
            <div id="message" class="mb-4 hidden rounded-md px-4 py-3 text-sm font-semibold"></div>
            <div class="flex flex-col gap-6 sm:flex-row sm:items-center">
                <div id="avatarPreview" class="flex h-24 w-24 shrink-0 items-center justify-center overflow-hidden rounded-lg bg-blue-100 text-3xl font-bold text-blue-700">A</div>
                <label id="avatarDropZone" class="flex flex-1 cursor-pointer flex-col items-center justify-center rounded-lg border-2 border-dashed border-gray-300 p-6 text-center hover:border-blue-500">
                    <i data-lucide="image-plus" class="h-7 w-7 text-blue-700"></i>
                    <span class="mt-2 font-semibold text-gray-900">Subir foto de perfil</span>
                    <span class="text-sm text-gray-500">Arrastra una imagen JPG o PNG o abre la carpeta de archivos</span>
                    <input id="avatarInput" type="file" accept="image/png,image/jpeg" class="hidden">
                </label>
            </div>

            <div class="mt-6 grid gap-4 sm:grid-cols-2">
                <div class="rounded-lg bg-gray-50 p-4">
                    <p class="text-xs font-bold uppercase text-gray-400">Nombre</p>
                    <p id="profileName" class="mt-2 font-semibold text-gray-900">-</p>
                </div>
                <div class="rounded-lg bg-gray-50 p-4">
                    <p class="text-xs font-bold uppercase text-gray-400">Email</p>
                    <p id="profileEmail" class="mt-2 font-semibold text-gray-900">-</p>
                </div>
                <div class="rounded-lg bg-gray-50 p-4 sm:col-span-2">
                    <p class="text-xs font-bold uppercase text-gray-400">Contraseña</p>
                    <p id="passwordDisplay" class="mt-2 font-semibold text-gray-900">Oculta por seguridad</p>
                    <div class="mt-3 flex flex-wrap gap-3">
                        <button id="btnShowPassword" class="rounded-md border border-gray-300 px-3 py-2 text-sm font-semibold text-gray-700 hover:bg-white">Ver contraseña</button>
                        <button id="btnOpenPassword" class="rounded-md bg-blue-600 px-3 py-2 text-sm font-semibold text-white hover:bg-blue-700">Cambiar contraseña</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="passwordPanel" class="mt-6 hidden rounded-lg border border-gray-200 bg-white p-6 shadow-sm">
            <h2 class="text-xl font-bold text-gray-900">Cambiar contraseña</h2>
            <form id="passwordForm" class="mt-4 space-y-4">
                <input name="currentPassword" type="password" placeholder="Contraseña actual" class="w-full rounded-md border border-gray-300 px-3 py-2" required>
                <input name="newPassword" type="password" placeholder="Nueva contraseña" class="no-paste-password w-full rounded-md border border-gray-300 px-3 py-2" required>
                <input name="confirmPassword" type="password" placeholder="Repetir nueva contraseña" class="no-paste-password w-full rounded-md border border-gray-300 px-3 py-2" required>
                <button type="submit" class="rounded-md bg-blue-600 px-4 py-2 font-semibold text-white hover:bg-blue-700">Guardar contraseña</button>
            </form>
        </section>
    </main>

    <script type="module" src="/js/script_perfil.js"></script>
</body>
</html>
