server {
    listen 3001;
    root /usr/share/nginx/html;
    index index.html;

    # Servir /admin/ directamente desde la raíz del contenedor
    location /admin/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }

    # Para cualquier otra ruta (assets sueltos, /admin sin barra, etc.)
    # servir desde raíz sin redirigir externamente
    location / {
        try_files $uri $uri/ /index.html;
    }
}
