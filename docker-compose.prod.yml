services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - admin
      - backend
    restart: always

  frontend:
    build: ./frontend
    expose:
      - "3000"
    environment:
      - VITE_API_URL=/api
    restart: always

  admin:
    build: ./admin
    expose:
      - "3001"
    environment:
      - VITE_API_URL=/api
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: DockerFile
    expose:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://database:3306/sportshop?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Madrid
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-curso}
    depends_on:
      database:
        condition: service_healthy
    restart: always

  database:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-curso}
      MYSQL_DATABASE: sportshop
      TZ: Europe/Madrid
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

volumes:
  mysql_data:
  certbot_certs:
