services:
  mysql:
    image: mysql:8.4
    container_name: mysql_sportshop
    hostname: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-curso}
      MYSQL_DATABASE: sportshop
      TZ: Europe/Madrid
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - bbdd_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_sportshop
    hostname: phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-curso}
      TZ: Europe/Madrid
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - bbdd_network

volumes:
  mysql_data:
    name: mysql_sportshop_data
    driver: local

networks:
  bbdd_network:
    name: bbdd_sportshop_network
    driver: bridge
