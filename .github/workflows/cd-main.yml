# Pipeline CD para rama main (Producción)
# Se ejecuta automáticamente al hacer push/merge a main
# Despliega en http://212.227.248.24/

name: CD - Producción

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Despliegue a producción
    runs-on: ubuntu-latest

    steps:
      - name: Desplegar en servidor VPS vía SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/dotes
            git pull origin main
            docker compose -f docker-compose.server.yml --env-file .env.production up -d --build --force-recreate
            echo "Despliegue producción completado: $(git rev-parse --short HEAD)"
