# Pipeline CI para rama release (Preproduccion)
# Se ejecuta con cada push a release o PR hacia release

name: CI - Release

on:
  push:
    branches: [release]
  pull_request:
    branches: [release]

jobs:
  test-backend:
    name: Tests del backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: uniformes_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Ejecutar tests
        run: |
          if [ ! -f pom.xml ]; then
            echo "No hay pom.xml todavia. Tests pendientes."
            exit 0
          fi
          chmod +x mvnw
          ./mvnw test --no-transfer-progress
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/uniformes_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

      - name: Verificar cobertura
        run: |
          if [ ! -f pom.xml ]; then exit 0; fi
          chmod +x mvnw
          ./mvnw verify --no-transfer-progress -DskipTests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/uniformes_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

  build-frontend:
    name: Build del frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar y compilar
        run: |
          if [ ! -f package.json ]; then
            echo "No hay package.json todavia. Build pendiente."
            exit 0
          fi
          npm ci
          npm run build

  build-admin:
    name: Build del panel admin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar y compilar
        run: |
          if [ ! -f package.json ]; then
            echo "No hay package.json todavia. Build pendiente."
            exit 0
          fi
          npm ci
          npm run build

  build-docker:
    name: Build imagenes Docker
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend, build-admin]

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen backend
        run: |
          if [ ! -f backend/Dockerfile ]; then
            echo "No hay Dockerfile en backend todavia."
            exit 0
          fi
          docker build -t campusfp-backend:release ./backend

      - name: Build imagen frontend
        run: |
          if [ ! -f frontend/Dockerfile ]; then
            echo "No hay Dockerfile en frontend todavia."
            exit 0
          fi
          docker build -t campusfp-frontend:release ./frontend

      - name: Build imagen admin
        run: |
          if [ ! -f admin/Dockerfile ]; then
            echo "No hay Dockerfile en admin todavia."
            exit 0
          fi
          docker build -t campusfp-admin:release ./admin

      - name: Validar docker-compose produccion
        run: |
          if [ ! -f docker-compose.prod.yml ]; then
            echo "No hay docker-compose.prod.yml todavia."
            exit 0
          fi
          docker compose -f docker-compose.prod.yml config
