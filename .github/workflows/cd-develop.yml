# Pipeline CD para rama develop (Desarrollo)
# Se ejecuta automáticamente al hacer push/merge a develop
# Despliega en http://212.227.248.24/dev/

name: CD - Desarrollo

on:
  push:
    branches: [develop]

jobs:
  deploy:
    name: Despliegue a desarrollo
    runs-on: ubuntu-latest

    steps:
      - name: Desplegar en servidor VPS vía SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/dotes-dev
            git pull origin develop
            docker compose -f docker-compose.server.yml --env-file .env.production -p dotes-dev up -d --build --force-recreate
            echo "Despliegue desarrollo completado: $(git rev-parse --short HEAD)"
