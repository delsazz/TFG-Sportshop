# Pipeline CI para rama develop (QA)
# Se ejecuta con cada push a develop o PR hacia develop

name: CI - Develop

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  test-backend:
    name: Tests del backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: uniformes_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Ejecutar tests
        run: |
          if [ ! -f pom.xml ]; then
            echo "No hay pom.xml todavia. Tests pendientes."
            exit 0
          fi
          chmod +x mvnw
          ./mvnw test --no-transfer-progress
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/uniformes_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

  build-frontend:
    name: Build del frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar y compilar
        run: |
          if [ ! -f package.json ]; then
            echo "No hay package.json todavia. Build pendiente."
            exit 0
          fi
          npm ci
          npm run build

  build-admin:
    name: Build del panel admin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar y compilar
        run: |
          if [ ! -f package.json ]; then
            echo "No hay package.json todavia. Build pendiente."
            exit 0
          fi
          npm ci
          npm run build

  sonarqube:
    name: Analisis SonarQube
    runs-on: ubuntu-latest
    if: always()
    needs: [test-backend]

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Verificar que hay codigo para analizar
        id: check
        run: |
          if [ ! -f backend/pom.xml ] && [ ! -f frontend/package.json ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No hay codigo todavia. SonarQube pendiente."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Build backend para binarios
        if: steps.check.outputs.skip != 'true' && hashFiles('backend/pom.xml') != ''
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw compile --no-transfer-progress -DskipTests

      - name: Analisis SonarQube
        if: steps.check.outputs.skip != 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
