<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Pago - SportShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/estilos_pago.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">SportShop</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/productos}">Productos</a></li>
            </ul>

            <div th:if="${usuario != null}" class="d-flex align-items-center">
                <a class="nav-link text-white me-3" th:href="@{/usuariopedidos}">Ver pedidos</a>
                <a class="btn btn-outline-light me-3 position-relative" th:href="@{/carrito}">
                    <i class="bi bi-cart"></i>
                    <span class="visually-hidden">Carrito</span>
                    <span th:if="${productosCarrito != null && productosCarrito > 0}"
                          class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                          th:text="${productosCarrito}">0</span>
                </a>
                <span class="text-white me-3">Bienvenido, <span th:text="${usuario}"></span></span>
                <a class="btn btn-outline-light" th:href="@{/logout}">Cerrar sesión</a>
            </div>
        </div>
    </div>
</nav>

<main class="container payment-shell">
    <div class="payment-panel">
        <div class="payment-header">
            <p class="text-uppercase text-muted mb-2">Finalizar compra</p>
            <h1 class="h3 mb-0">Elige cómo quieres pagar</h1>
        </div>

        <div class="order-total">
            <span>Total del pedido</span>
            <strong><span th:text="${total}">0</span> €</strong>
        </div>

        <form th:action="@{/seleccionarMetodoPago}" method="post" class="payment-options">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <label class="payment-option">
                <input type="radio" name="metodoPago" value="bizum" required>
                <span class="payment-option-icon"><i class="bi bi-phone"></i></span>
                <span>
                    <strong>Bizum</strong>
                    <small>Ver teléfono de contacto y acceder al banco.</small>
                </span>
            </label>

            <label class="payment-option">
                <input type="radio" name="metodoPago" value="tarjeta" required>
                <span class="payment-option-icon"><i class="bi bi-credit-card-2-front"></i></span>
                <span>
                    <strong>Pago con tarjeta</strong>
                    <small>Pago seguro con Stripe Checkout o modo de demostración.</small>
                </span>
            </label>

            <label class="payment-option">
                <input type="radio" name="metodoPago" value="transferencia" required>
                <span class="payment-option-icon"><i class="bi bi-bank"></i></span>
                <span>
                    <strong>Transferencia bancaria</strong>
                    <small>Consulta el IBAN y registra el pedido.</small>
                </span>
            </label>

            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-success btn-lg">
                    <i class="bi bi-arrow-right-circle"></i> Continuar
                </button>
                <a th:href="@{/carrito}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Volver al carrito
                </a>
            </div>
        </form>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
