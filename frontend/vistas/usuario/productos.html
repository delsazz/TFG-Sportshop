<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Productos - SportShop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/estilos_productos.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" th:href="@{/}">SportShop</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/}">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" th:href="@{/productos}">Productos</a>
        </li>
      </ul>

      <div th:if="${usuario != null}" class="d-flex align-items-center">
        <a class="nav-link text-white me-3" th:href="@{/usuariopedidos}">
          Ver pedidos
        </a>
        <a class="btn btn-outline-light me-3 position-relative" th:href="@{/carrito}">
          <i class="bi bi-cart"></i>
          <span class="visually-hidden">Carrito</span>
          <span id="badge-carrito" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
            <span th:text="${productosCarrito}">0</span>
            <span class="visually-hidden">Productos en el carrito</span>
          </span>
        </a>
        <span class="text-white me-3">
          Bienvenido, <span th:text="${usuario}"></span>
        </span>
        <a class="btn btn-outline-light" th:href="@{/logout}">
          Cerrar sesión
        </a>
      </div>

      <div th:if="${usuario == null}">
        <a class="btn btn-outline-light" th:href="@{/login}">
          Iniciar sesión
        </a>
      </div>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <h2 class="mb-4">Catálogo de productos</h2>

  <div class="table-responsive">
    <table class="table table-striped table-bordered">
      <thead class="table-dark">
      <tr>
        <th>Foto</th>
        <th>Nombre</th>
        <th>Precio</th>
        <th>Stock</th>
        <th>Acciones</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="producto : ${listaProductos}">
        <td>
          <img th:if="${producto.foto != null}" th:src="@{/img/{nombre}(nombre=${producto.foto.nombreFoto})}" alt="Foto del producto" class="img-thumbnail" style="width:80px; height:80px; object-fit:cover;">
          <span th:if="${producto.foto == null}">Sin foto</span>
        </td>
        <td th:text="${producto.nombre}"></td>
        <td th:text="${producto.precio} + ' €'"></td>
        <td th:text="${producto.stock}"></td>
        <td>
          <a th:href="@{/anadirProductoCarrito(id=${producto.idProducto})}" class="btn btn-sm btn-primary">
            <i class="bi bi-cart-plus"></i> Añadir al carrito
          </a>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
