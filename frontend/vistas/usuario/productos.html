<!DOCTYPE html>
<html lang="es">
<head>
  <title>Productos - SportShop</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/estilos_productos.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">SportShop</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" href="/">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="/productos">Productos</a>
        </li>
      </ul>

      <div id="menu-usuario" class="d-none align-items-center">
        <a class="nav-link text-white me-3" href="/usuariopedidos">
          Ver pedidos
        </a>
        <a class="btn btn-outline-light me-3 position-relative" href="/carrito">
          <i class="bi bi-cart"></i>
          <span class="visually-hidden">Carrito</span>
          <span id="badge-carrito" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
            <span>0</span>
            <span class="visually-hidden">Productos en el carrito</span>
          </span>
        </a>
        <span class="text-white me-3">
          Bienvenido, <span id="nombre-usuario"></span>
        </span>
        <a class="btn btn-outline-light" href="/logout">
          Cerrar sesión
        </a>
      </div>

      <div id="menu-login">
        <a class="btn btn-outline-light" href="/login">
          Iniciar sesión
        </a>
      </div>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <h2 class="mb-4">Catálogo de productos</h2>
  <div id="alerta-productos" class="alert d-none" role="alert"></div>

  <div class="table-responsive">
    <table class="table table-striped table-bordered">
      <thead class="table-dark">
      <tr>
        <th>Foto</th>
        <th>Nombre</th>
        <th>Precio</th>
        <th>Tallas</th>
        <th>Stock</th>
        <th>Acciones</th>
      </tr>
      </thead>
      <tbody id="tabla-productos">
      <tr>
        <td colspan="6" class="text-center py-4">Cargando productos...</td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/JavaScript/usuario/script_productos.js"></script>
</body>
</html>
