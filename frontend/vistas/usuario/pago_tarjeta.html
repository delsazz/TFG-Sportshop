<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Pago con tarjeta - SportShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/estilos_pago.css" rel="stylesheet">
</head>
<body>
<main class="container payment-shell">
    <div class="payment-panel">
        <div class="payment-header">
            <p class="text-uppercase text-muted mb-2">Pago con tarjeta</p>
            <h1 class="h3 mb-0">Pago seguro con Stripe</h1>
        </div>

        <div class="order-total">
            <span>Total del pedido</span>
            <strong><span th:text="${total}">0</span> €</strong>
        </div>

        <div th:if="${error != null}" class="alert alert-danger">
            <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
        </div>

        <form th:action="@{/pago/tarjeta/stripe}" method="post" class="mb-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn btn-success btn-lg w-100">
                <i class="bi bi-lock"></i> Pagar con Stripe Checkout
            </button>
        </form>

        <div th:if="${stripeConfigurado == false}" class="demo-card-form">
            <h2 class="h5 mb-3">Modo demostración</h2>
            <form th:action="@{/pago/tarjeta/confirmar}" method="post" id="formPago">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="mb-3">
                    <label for="numeroTarjeta" class="form-label">Número de tarjeta</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-credit-card"></i></span>
                        <input type="text" class="form-control" id="numeroTarjeta" name="numeroTarjeta" placeholder="4242 4242 4242 4242" maxlength="19" required>
                    </div>
                    <div class="invalid-feedback">Introduce 16 dígitos.</div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="fechaCaducidad" class="form-label">Caducidad</label>
                        <input type="text" class="form-control" id="fechaCaducidad" name="fechaCaducidad" placeholder="MM/AA" maxlength="5" required>
                        <div class="invalid-feedback">Formato MM/AA.</div>
                    </div>
                    <div class="col-md-6">
                        <label for="cvv" class="form-label">CVV</label>
                        <input type="password" class="form-control" id="cvv" name="cvv" placeholder="123" maxlength="4" required>
                        <div class="invalid-feedback">Código de 3 o 4 dígitos.</div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="titular" class="form-label">Titular</label>
                    <input type="text" class="form-control" id="titular" name="titular" placeholder="Como aparece en la tarjeta" required>
                </div>

                <button type="submit" class="btn btn-outline-primary w-100">
                    Confirmar pago de demostración
                </button>
            </form>
        </div>

        <a th:href="@{/pagar_pedido}" class="btn btn-outline-secondary w-100 mt-3">
            <i class="bi bi-arrow-left"></i> Cambiar método de pago
        </a>
    </div>
</main>
<script src="/JavaScript/usuario/script_pago.js"></script>
</body>
</html>
