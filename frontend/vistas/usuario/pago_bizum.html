<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Pago Bizum - SportShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/estilos_pago.css" rel="stylesheet">
</head>
<body>
<main class="container payment-shell">
    <div class="payment-panel">
        <div class="payment-header">
            <p class="text-uppercase text-muted mb-2">Bizum</p>
            <h1 class="h3 mb-0">Realiza el Bizum a este teléfono</h1>
        </div>

        <div class="order-total">
            <span>Total del pedido</span>
            <strong><span th:text="${total}">0</span> €</strong>
        </div>

        <div class="payment-data">
            <span>Teléfono de contacto</span>
            <strong th:text="${configuracionPago.telefonoBizum}">600123456</strong>
        </div>

        <div class="d-grid gap-2">
            <a th:href="${configuracionPago.urlBancoBizum}" class="btn btn-primary btn-lg">
                <i class="bi bi-box-arrow-up-right"></i> Hacer Bizum en mi banco
            </a>
            <form th:action="@{/pago/bizum/confirmar}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-success btn-lg w-100">
                    <i class="bi bi-check2-circle"></i> Ya he realizado el Bizum
                </button>
            </form>
            <a th:href="@{/pagar_pedido}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Cambiar método de pago
            </a>
        </div>
    </div>
</main>
</body>
</html>
