<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mis pedidos - SportShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <div th:if="${param.pagado}" class="alert alert-success">
        El pedido se ha procesado correctamente.
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Mis pedidos</h1>
        <a th:href="@{/productos}" class="btn btn-outline-secondary">Seguir comprando</a>
    </div>

    <div th:if="${#lists.isEmpty(listaPedidos)}" class="alert alert-info">
        Todavía no tienes pedidos.
    </div>

    <div th:if="${!#lists.isEmpty(listaPedidos)}" class="table-responsive">
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Fecha pedido</th>
                <th>Fecha entrega</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="pedido : ${listaPedidos}">
                <td th:text="${pedido.idPedido}"></td>
                <td th:text="${pedido.fechaPedido}"></td>
                <td th:text="${pedido.fechaEntrega}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
