<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Configuración de pagos - SportShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/zonaAdmin}">SportShop - Admin</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/zonaAdmin}">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/zonaAdmin/productos}">Productos</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/zonaAdmin/pedidos}">Pedidos</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/zonaAdmin/usuarios}">Usuarios</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/zonaAdmin/pagos}">Pagos</a></li>
            </ul>
            <div class="d-flex align-items-center">
                <span class="text-white me-3" th:if="${usuario != null}">Admin: <span th:text="${usuario}"></span></span>
                <a class="btn btn-outline-light" th:href="@{/logout}">Cerrar sesión</a>
            </div>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1">Configuración de pagos</h1>
            <p class="text-muted mb-0">Estos datos se muestran al cliente durante el pago.</p>
        </div>
        <a th:href="@{/zonaAdmin}" class="btn btn-outline-secondary">Volver</a>
    </div>

    <div th:if="${param.guardado}" class="alert alert-success">
        Configuración de pagos actualizada correctamente.
    </div>

    <form th:action="@{/zonaAdmin/pagos}" method="post" class="card">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="card-body">
            <h2 class="h5 mb-3"><i class="bi bi-phone"></i> Bizum</h2>
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <label for="telefonoBizum" class="form-label">Teléfono Bizum</label>
                    <input id="telefonoBizum" name="telefonoBizum" class="form-control" th:value="${configuracionPago.telefonoBizum}" required>
                </div>
                <div class="col-md-8">
                    <label for="urlBancoBizum" class="form-label">URL de acceso al banco</label>
                    <input id="urlBancoBizum" name="urlBancoBizum" type="url" class="form-control" th:value="${configuracionPago.urlBancoBizum}" required>
                </div>
            </div>

            <h2 class="h5 mb-3"><i class="bi bi-bank"></i> Transferencia bancaria</h2>
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <label for="titularTransferencia" class="form-label">Titular</label>
                    <input id="titularTransferencia" name="titularTransferencia" class="form-control" th:value="${configuracionPago.titularTransferencia}" required>
                </div>
                <div class="col-md-4">
                    <label for="ibanTransferencia" class="form-label">IBAN</label>
                    <input id="ibanTransferencia" name="ibanTransferencia" class="form-control" th:value="${configuracionPago.ibanTransferencia}" required>
                </div>
                <div class="col-md-4">
                    <label for="conceptoTransferencia" class="form-label">Concepto</label>
                    <input id="conceptoTransferencia" name="conceptoTransferencia" class="form-control" th:value="${configuracionPago.conceptoTransferencia}" required>
                </div>
            </div>

            <h2 class="h5 mb-3"><i class="bi bi-credit-card"></i> Stripe</h2>
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="stripePublicKey" class="form-label">Clave pública</label>
                    <input id="stripePublicKey" name="stripePublicKey" class="form-control" th:value="${configuracionPago.stripePublicKey}" placeholder="pk_test_...">
                </div>
                <div class="col-md-6">
                    <label for="stripeSecretKey" class="form-label">Clave secreta</label>
                    <input id="stripeSecretKey" name="stripeSecretKey" type="password" class="form-control" th:value="${configuracionPago.stripeSecretKey}" placeholder="sk_test_...">
                </div>
            </div>
        </div>
        <div class="card-footer text-end">
            <button type="submit" class="btn btn-success">
                <i class="bi bi-save"></i> Guardar configuración
            </button>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
