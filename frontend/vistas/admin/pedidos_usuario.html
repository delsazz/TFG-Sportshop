<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pedidos del usuario - SportShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1">Pedidos del usuario</h1>
            <p class="text-muted mb-0" th:if="${usuario != null}" th:text="${usuario.correoElectronico}"></p>
        </div>
        <a th:href="@{/zonaAdmin/pedidos}" class="btn btn-outline-secondary">Volver</a>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div th:if="${listaPedidosUsuario != null and #lists.isEmpty(listaPedidosUsuario)}" class="alert alert-info">
        Este usuario no tiene pedidos.
    </div>

    <div th:if="${listaPedidosUsuario != null and !#lists.isEmpty(listaPedidosUsuario)}" class="table-responsive">
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Fecha pedido</th>
                <th>Fecha entrega</th>
                <th>Método de pago</th>
                <th>Productos</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="pedido : ${listaPedidosUsuario}">
                <td th:text="${pedido.idPedido}"></td>
                <td th:text="${pedido.fechaPedido}"></td>
                <td th:text="${pedido.fechaEntrega}"></td>
                <td th:text="${pedido.metodoPago != null ? pedido.metodoPago : 'No indicado'}"></td>
                <td>
                    <ul class="mb-0 ps-3" th:if="${pedido.detalles != null}">
                        <li th:each="detalle : ${pedido.detalles}">
                            <span th:text="${detalle.producto != null ? detalle.producto.nombre : 'Producto eliminado'}"></span>
                            <span th:text="${' x' + detalle.unidades}"></span>
                            <span th:text="${' - ' + detalle.precio + ' €'}"></span>
                        </li>
                    </ul>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
