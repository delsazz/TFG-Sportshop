<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuarios - SportShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Usuarios registrados</h1>
        <a th:href="@{/zonaAdmin}" class="btn btn-outline-secondary">Volver</a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-bordered align-middle">
            <thead class="table-dark">
            <tr>
                <th>Correo</th>
                <th>Nombre</th>
                <th>Rol</th>
                <th>Ciudad</th>
                <th>País</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="usuario : ${listaUsuarios}">
                <td th:text="${usuario.correoElectronico}"></td>
                <td th:text="${usuario.nombre + ' ' + usuario.apellidos}"></td>
                <td th:text="${usuario.rol}"></td>
                <td th:text="${usuario.ciudad}"></td>
                <td th:text="${usuario.pais}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
