<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pedidos - SportShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Pedidos</h1>
        <a th:href="@{/zonaAdmin}" class="btn btn-outline-secondary">Volver</a>
    </div>

    <div th:if="${#lists.isEmpty(listaPedidos)}" class="alert alert-info">
        No hay pedidos
    </div>

    <div th:if="${!#lists.isEmpty(listaPedidos)}" class="table-responsive">
        <table class="table table-striped table-bordered align-middle">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Fecha pedido</th>
                <th>Fecha entrega</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="pedido : ${listaPedidos}">
                <td th:text="${pedido.idPedido}"></td>
                <td th:text="${pedido.usuario != null ? pedido.usuario.correoElectronico : 'Sin usuario'}"></td>
                <td th:text="${pedido.fechaPedido}"></td>
                <td th:text="${pedido.fechaEntrega}"></td>
                <td>
                    <a th:if="${pedido.usuario != null}" th:href="@{/zonaAdmin/pedidos/{correo}(correo=${pedido.usuario.correoElectronico})}" class="btn btn-sm btn-primary">
                        Ver pedidos del usuario
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
