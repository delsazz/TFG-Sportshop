<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Productos - SportShop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" th:href="@{/}">SportShop</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/zonaAdmin}">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" th:href="@{/zonaAdmin/productos}">Productos</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/zonaAdmin/pedidos}">Pedidos</a>
        </li>
      </ul>
      <div class="d-flex align-items-center">
        <span class="text-white me-3" th:if="${usuario != null}">
          Admin: <span th:text="${usuario}"></span>
        </span>
        <a class="btn btn-outline-light" th:href="@{/logout}">
          Cerrar sesión
        </a>
      </div>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <h2 class="mb-4">Catálogo de productos</h2>

  <div class="card mb-4">
    <div class="card-header">Añadir producto</div>
    <div class="card-body">
      <form th:action="@{/zonaAdmin/anadirProducto}" method="post" class="row g-3">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="col-md-4">
          <label for="nombre" class="form-label">Nombre</label>
          <input id="nombre" name="nombre" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label for="precio" class="form-label">Precio</label>
          <input id="precio" name="precio" type="number" min="0" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label for="stock" class="form-label">Stock</label>
          <input id="stock" name="stock" type="number" min="0" class="form-control" required>
        </div>
        <div class="col-12">
          <label for="descripcion" class="form-label">Descripción</label>
          <textarea id="descripcion" name="descripcion" class="form-control" rows="3" required></textarea>
        </div>
        <div class="col-12 text-end">
          <button type="submit" class="btn btn-success">
            <i class="bi bi-plus-circle"></i> Guardar producto
          </button>
        </div>
      </form>
    </div>
  </div>

  <table class="table table-striped table-bordered">
    <thead class="table-dark">
    <tr>
      <th>Foto</th>
      <th>Nombre</th>
      <th>Precio</th>
      <th>Stock</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="producto : ${listaProductos}">
      <td>
        <img th:if="${producto.foto != null}" th:src="@{/img/{nombre}(nombre=${producto.foto.nombreFoto})}" alt="Foto del producto" class="img-thumbnail" style="width:80px; height:80px; object-fit:cover;">
        <span th:if="${producto.foto == null}">Sin foto</span>
      </td>
      <td th:text="${producto.nombre}"></td>
      <td th:text="${producto.precio} + ' €'"></td>
      <td th:text="${producto.stock}"></td>
    </tr>
    </tbody>
  </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
