<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Productos - SportShop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" th:href="@{/}">SportShop</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/}">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" th:href="@{productos}">Productos</a>
        </li>
      </ul>
      <a class="btn btn-outline-light" th:href="@{/login}">
        Iniciar sesión
      </a>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <h2 class="mb-4">Catálogo de productos</h2>
  <table class="table table-striped table-bordered">
    <thead class="table-dark">
    <tr>
      <th>Foto</th>
      <th>Nombre</th>
      <th>Precio</th>
      <th>Stock</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="producto : ${listaProductos}">
      <td th:text="${producto.foto}"></td>
      <td th:text="${producto.nombre}"></td>
      <td th:text="${producto.precio} + ' €'"></td>
      <td th:text="${producto.stock}"></td>
    </tr>
    </tbody>
  </table>

  <div class="mt-3 text-end">
    <a th:href="@{/nuevo_producto}" class="btn btn-success">
      Añadir Producto
    </a>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/JavaScript/script_productos.js"></script>
</body>
</html>
