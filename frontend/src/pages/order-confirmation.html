<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/img/campusfp.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmación de Pedido — CampusFP</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
  <div id="layout-container">
    <!-- Navbar placeholder (if needed) -->
  </div>

  <div id="not-found-container" class="bg-slate-50 px-4 py-12 hidden">
    <div class="mx-auto max-w-4xl rounded-[1.5rem] bg-white p-5 shadow-sm ring-1 ring-slate-200 sm:rounded-[2rem] sm:p-8">
      <h1 class="text-3xl font-bold text-slate-900">Pedido no encontrado</h1>
      <a href="/" class="mt-6 inline-flex rounded-2xl bg-blue-700 px-6 py-3 font-semibold text-white transition hover:bg-blue-800">
        Volver
      </a>
    </div>
  </div>

  <div id="confirmation-container" class="bg-slate-50 px-4 py-12 hidden">
    <div class="mx-auto max-w-4xl rounded-[1.5rem] bg-white p-5 shadow-sm ring-1 ring-slate-200 sm:rounded-[2rem] sm:p-8">
      <p class="text-sm font-semibold uppercase tracking-[0.24em] text-emerald-700">Confirmación</p>
      <h1 class="mt-4 text-3xl font-bold text-slate-900 sm:text-4xl">Pedido registrado</h1>
      <p id="order-subtitle" class="mt-3 text-slate-600">
        Pedido #-. Pago -. Estado -.
      </p>

      <div id="receipt-upload-section" class="mt-8 rounded-3xl border border-slate-200 p-5 sm:p-6 hidden">
        <h2 class="text-xl font-bold text-slate-900 sm:text-2xl">Subir comprobante</h2>
        <p class="mt-2 text-slate-600">Adjuntar justificante Bizum o transferencia.</p>
        <input
          type="file"
          id="receipt-file"
          accept=".pdf,.png,.jpg,.jpeg"
          class="mt-4 block w-full rounded-2xl border border-slate-300 px-4 py-3"
        />
        <button
          type="button"
          id="btn-upload-receipt"
          disabled
          class="mt-4 inline-flex rounded-2xl bg-blue-700 px-6 py-3 font-semibold text-white disabled:bg-slate-300 transition hover:bg-blue-800 disabled:hover:bg-slate-300 cursor-pointer"
        >
          Subir comprobante
        </button>
        <p id="upload-message" class="mt-3 text-sm text-slate-600 hidden"></p>
      </div>

      <div class="mt-8 rounded-3xl border border-slate-200 p-5 sm:p-6">
        <h2 class="text-xl font-bold text-slate-900 sm:text-2xl">Resumen</h2>
        <div id="order-summary-items" class="mt-6 space-y-4">
          <!-- Items load via JS -->
        </div>
      </div>

      <div class="mt-8 flex flex-col gap-3 sm:flex-row sm:gap-4">
        <a href="/catalogo.html" class="inline-flex items-center justify-center rounded-2xl bg-blue-700 px-6 py-3 font-semibold text-white transition hover:bg-blue-800">
          Seguir comprando
        </a>
        <a href="/my-orders.html" class="inline-flex items-center justify-center rounded-2xl border border-slate-300 px-6 py-3 font-semibold text-slate-900 transition hover:bg-slate-50">
          Ver pedidos
        </a>
      </div>
    </div>
  </div>

  <script src="js/authStorage.js"></script>
  <script src="js/order-confirmation.js"></script>
</body>
</html>
