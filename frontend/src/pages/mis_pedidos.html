<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/img/sportshop.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis Pedidos - SportShop</title>
  <link rel="stylesheet" href="/css/my-orders.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="layout-container"></div>

  <main class="orders-page">
    <section class="orders-shell">
      <header class="orders-header">
        <div>
          <p>Cuenta</p>
          <h1>Mis pedidos</h1>
        </div>
        <a href="catalogo.html" class="orders-link">Ir al catalogo</a>
      </header>

      <div id="loading-container" class="orders-state">Cargando tus pedidos...</div>
      <div id="error-container" class="orders-state orders-error hidden">Error al cargar tus pedidos.</div>

      <section id="content-container" class="hidden">
        <div id="empty-state" class="orders-empty hidden">
          <h2>Aun no has realizado ningun pedido</h2>
          <p>Cuando completes una compra, veras aqui el detalle de productos, unidades, precio y estado.</p>
          <a href="catalogo.html" class="orders-link">Ver productos</a>
        </div>

        <div id="orders-list" class="orders-list"></div>
      </section>
    </section>
  </main>

  <script src="/js/components/script_estructura.js"></script>
  <script src="/js/script_almacenamiento_autenticacion.js"></script>
  <script src="/js/script_mis_pedidos.js"></script>
  <script src="/js/components/script_footer.js"></script>
</body>
</html>
