<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/img/campusfp.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Perfil — CampusFP</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="css/style.css" />
  <!-- Íconos usando Lucide como SVG o fuente, para simplificar usaremos FontAwesome o similar si no hay, o SVGs inline -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
  <div id="layout-container">
    <!-- Navbar placeholder (if needed) -->
  </div>

  <div id="loading-container" class="px-4 py-16 text-center text-lg text-slate-600">
    Cargando perfil...
  </div>

  <div id="profile-container" class="mx-auto max-w-6xl px-4 py-8 sm:py-10 hidden">
    <div class="overflow-hidden rounded-[1.5rem] bg-white shadow-sm ring-1 ring-slate-200 sm:rounded-[2rem]">
      <div class="bg-[radial-gradient(circle_at_top_left,_rgba(59,130,246,0.28),_transparent_42%),linear-gradient(135deg,_#0f172a,_#1d4ed8)] px-5 py-8 text-white sm:px-8 sm:py-10">
        <div class="flex flex-col gap-6 lg:flex-row lg:items-end lg:justify-between">
          <div class="flex flex-col gap-4 min-[420px]:flex-row min-[420px]:items-center sm:gap-5">
            <div id="profile-initial" class="flex h-16 w-16 shrink-0 items-center justify-center rounded-[1.25rem] bg-white/15 text-2xl font-bold backdrop-blur sm:h-20 sm:w-20 sm:rounded-[1.75rem] sm:text-3xl">
              U
            </div>
            <div>
              <p class="text-sm font-semibold uppercase tracking-[0.25em] text-blue-100">
                Mi perfil
              </p>
              <h1 id="profile-name-title" class="mt-2 text-3xl font-bold sm:text-4xl">
                -
              </h1>
              <p id="profile-email-subtitle" class="mt-2 text-blue-100">-</p>
            </div>
          </div>

          <div class="flex flex-wrap gap-3">
            <span id="profile-role-badge" class="rounded-full bg-white/10 px-4 py-2 text-sm font-semibold">
              Cliente
            </span>
            <span id="profile-orders-badge" class="rounded-full bg-white/10 px-4 py-2 text-sm font-semibold">
              0 pedidos
            </span>
            <button
              type="button"
              id="btn-edit-profile"
              class="inline-flex items-center gap-2 rounded-full bg-white px-4 py-2 text-sm font-semibold text-slate-900 transition hover:bg-blue-50 cursor-pointer"
            >
              <i data-lucide="edit-3" class="h-4 w-4"></i>
              Editar perfil
            </button>
          </div>
        </div>
      </div>

      <div class="px-5 py-6 sm:px-8 sm:py-8">
        <div id="message-container" class="hidden mb-6 rounded-2xl px-5 py-4 text-sm font-semibold"></div>

        <div class="mb-6 flex items-end justify-between gap-4">
          <div>
            <h2 class="text-xl font-bold text-slate-900 sm:text-2xl">Todos tus datos</h2>
            <p class="mt-2 text-slate-600">Se muestran los datos actuales guardados en base de datos.</p>
          </div>
        </div>

        <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-3" id="profile-rows-container">
          <!-- Rows cargadas por JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Edición -->
  <div id="edit-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/45 p-4 hidden">
    <div class="max-h-[90vh] w-full max-w-2xl overflow-auto rounded-[1.5rem] bg-white p-5 shadow-2xl ring-1 ring-slate-200 sm:rounded-[2rem] sm:p-8">
      <div class="flex items-start justify-between gap-4">
        <div>
          <p class="text-sm font-semibold uppercase tracking-[0.2em] text-blue-700">
            Editar perfil
          </p>
          <h2 class="mt-2 text-2xl font-bold text-slate-900 sm:text-3xl">Actualizar datos</h2>
          <p class="mt-2 text-slate-600">
            Puedes cambiar todos los datos excepto la contraseña.
          </p>
        </div>

        <button
          type="button"
          id="btn-close-modal"
          class="rounded-2xl border border-slate-200 p-3 text-slate-500 transition hover:bg-slate-50 cursor-pointer"
          aria-label="Cerrar edicion"
        >
          <i data-lucide="x" class="h-4 w-4"></i>
        </button>
      </div>

      <form id="edit-profile-form" class="mt-8 space-y-5">
        <div class="grid gap-5 md:grid-cols-2">
          <div>
            <label class="mb-2 block text-sm font-semibold text-slate-700">Nombre</label>
            <input type="text" name="nombre" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-blue-500 disabled:bg-slate-100 disabled:text-slate-500" required />
          </div>
          <div>
            <label class="mb-2 block text-sm font-semibold text-slate-700">Apellidos</label>
            <input type="text" name="apellidos" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-blue-500 disabled:bg-slate-100 disabled:text-slate-500" required />
          </div>
        </div>

        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-700">Email</label>
          <input type="email" name="email" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-blue-500 disabled:bg-slate-100 disabled:text-slate-500" required />
        </div>

        <div class="grid gap-5 md:grid-cols-2">
          <div>
            <label class="mb-2 block text-sm font-semibold text-slate-700">Teléfono</label>
            <input type="tel" name="telefono" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-blue-500 disabled:bg-slate-100 disabled:text-slate-500" />
          </div>
          <div>
            <label class="mb-2 block text-sm font-semibold text-slate-700">Contraseña</label>
            <input type="text" value="No editable desde aquí" disabled class="w-full rounded-2xl border border-slate-200 bg-slate-100 px-4 py-3 text-slate-500" />
          </div>
        </div>

        <div class="rounded-3xl border border-slate-200 bg-slate-50 p-5">
          <div class="flex items-center gap-3 text-slate-900">
            <i data-lucide="map-pin" class="h-5 w-5 text-blue-700"></i>
            <h3 class="text-base font-bold">Dirección</h3>
          </div>

          <div class="mt-5 grid gap-5 md:grid-cols-6">
            <div class="md:col-span-4">
              <label class="mb-2 block text-sm font-semibold text-slate-700">Calle</label>
              <input type="text" name="direccionCalle" placeholder="Calle Principal" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-blue-500 disabled:bg-slate-100 disabled:text-slate-500" />
            </div>
            <div class="md:col-span-2">
              <label class="mb-2 block text-sm font-semibold text-slate-700">Portal / número</label>
              <input type="text" name="direccionNumero" placeholder="12B" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-blue-500 disabled:bg-slate-100 disabled:text-slate-500" />
            </div>
            <div class="md:col-span-2">
              <label class="mb-2 block text-sm font-semibold text-slate-700">Piso (opcional)</label>
              <input type="text" name="direccionPiso" placeholder="2º A" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-blue-500 disabled:bg-slate-100 disabled:text-slate-500" />
            </div>
            <div class="md:col-span-2">
              <label class="mb-2 block text-sm font-semibold text-slate-700">Ciudad</label>
              <input type="text" name="direccionCiudad" placeholder="Madrid" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-blue-500 disabled:bg-slate-100 disabled:text-slate-500" />
            </div>
            <div class="md:col-span-2">
              <label class="mb-2 block text-sm font-semibold text-slate-700">Provincia</label>
              <input type="text" name="direccionProvincia" placeholder="Madrid" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-blue-500 disabled:bg-slate-100 disabled:text-slate-500" />
            </div>
            <div class="md:col-span-2">
              <label class="mb-2 block text-sm font-semibold text-slate-700">Código postal</label>
              <input type="text" name="codigoPostal" inputmode="numeric" pattern="[0-9]{5}" maxlength="5" placeholder="28001" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-blue-500 disabled:bg-slate-100 disabled:text-slate-500" />
            </div>
          </div>
        </div>

        <div class="flex flex-col gap-3 pt-2 sm:flex-row">
          <button type="submit" id="btn-save" class="inline-flex flex-1 items-center justify-center gap-2 rounded-2xl bg-blue-700 px-5 py-4 font-semibold text-white transition hover:bg-blue-800 disabled:cursor-not-allowed disabled:bg-blue-300 cursor-pointer">
            <i data-lucide="save" class="h-4 w-4"></i>
            Guardar cambios
          </button>
          <button type="button" id="btn-cancel" class="flex-1 rounded-2xl border border-slate-200 px-5 py-4 font-semibold text-slate-700 transition hover:bg-slate-50 cursor-pointer">
            Cancelar
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/authStorage.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
