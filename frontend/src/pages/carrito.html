<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/img/sportshop.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Carrito - SportShop</title>
  <link rel="stylesheet" href="/css/checkout.css" />
</head>
<body class="bg-slate-50">
  <div id="layout-container">
    <!-- Navbar placeholder -->
  </div>

  <div id="empty-state" class="hidden min-h-[calc(100vh-8rem)] px-4 py-16">
    <div class="mx-auto max-w-3xl rounded-3xl bg-white p-6 shadow-sm ring-1 ring-slate-200 sm:p-10">
      <p class="text-sm font-semibold uppercase tracking-[0.24em] text-blue-700">Carrito</p>
      <h1 class="mt-4 text-3xl font-bold text-slate-900">Tu carrito está vacío</h1>
      <p class="mt-3 text-slate-600">No hay productos añadidos todavía.</p>
      <a href="catalogo.html" class="mt-8 inline-flex rounded-2xl bg-blue-700 px-6 py-3 font-semibold text-white transition hover:bg-blue-800">
        Ir al catálogo
      </a>
    </div>
  </div>

  <div id="cart-content" class="hidden px-4 py-12">
    <div class="mx-auto max-w-6xl">
      <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
        <div>
          <p class="text-sm font-semibold uppercase tracking-[0.24em] text-blue-700">Tu carrito</p>
          <h1 class="mt-2 text-3xl font-bold text-slate-900 sm:text-4xl">Revisa tus productos</h1>
          <p id="cart-items-count" class="mt-3 text-slate-600">Puedes modificar las unidades o eliminar productos antes de pagar.</p>
        </div>
      </div>

      <div class="mt-8 grid gap-6 lg:grid-cols-[1.2fr_0.8fr] lg:gap-8">
        <!-- Lista de productos -->
        <section class="rounded-[1.5rem] bg-white p-5 shadow-sm ring-1 ring-slate-200 sm:rounded-[2rem] sm:p-8">
          <div class="flex justify-between items-center border-b pb-4 mb-4">
             <h2 class="text-2xl font-bold text-slate-900">Productos</h2>
          </div>
          
          <div id="cart-items-container" class="space-y-6">
            <!-- Inyectado por JS -->
          </div>
        </section>

        <!-- Resumen -->
        <aside class="rounded-[1.5rem] bg-slate-950 p-5 text-white shadow-sm sm:rounded-[2rem] sm:p-8 self-start">
          <p class="text-sm font-semibold uppercase tracking-[0.24em] text-blue-300">Resumen</p>
          <h2 class="mt-4 text-2xl font-bold">Total del carrito</h2>

          <div class="mt-8 border-t border-white/10 pt-6 space-y-4">
            <div class="flex items-center justify-between text-slate-300">
              <span>Subtotal</span>
              <span id="cart-subtotal" class="text-xl text-white">0.00 EUR</span>
            </div>
            <div class="flex items-center justify-between text-slate-300">
              <span class="text-xl font-bold">Total</span>
              <span id="cart-total" class="text-2xl font-bold text-white">0.00 EUR</span>
            </div>
            
            <a href="finalizar_compra.html" class="mt-8 flex w-full items-center justify-center rounded-2xl bg-blue-600 px-6 py-4 font-semibold text-white transition hover:bg-blue-700 text-lg">
              Proceder al pago
            </a>
            <button id="clear-cart-btn" type="button" class="mt-6 mx-auto block text-sm font-medium text-blue-300 underline decoration-transparent transition hover:decoration-current">
              Vaciar carrito
            </button>
          </div>
        </aside>
      </div>
    </div>
  </div>

  <script src="/js/components/script_estructura.js"></script>
  <script src="/js/script_almacenamiento_autenticacion.js"></script>
  <script src="/js/script_carrito.js"></script>
  <script src="/js/components/script_footer.js"></script>
</body>
</html>
