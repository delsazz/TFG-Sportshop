<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/img/sportshop.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Carrito - SportShop</title>
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/carrito.css" />
</head>

<body>
  <div id="layout-container">
    <!-- Navbar placeholder -->
  </div>

  <main class="cart-main-container container">
    <div id="empty-state" class="cart-empty-state hidden">
      <p class="subtitle">Carrito</p>
      <h1>Tu carrito está vacío</h1>
      <p>No hay productos añadidos todavía.</p>
      <a href="catalogo.html" class="btn-sport btn-empty-cart">Ir al catálogo</a>
    </div>

    <div id="cart-content" class="cart-content hidden">
      <h1 class="cart-page-title">Mi Carrito</h1>

      <div class="cart-layout">
        <!-- Table container -->
        <div class="cart-table-wrapper">
          <table class="cart-table">
            <thead>
              <tr>
                <th class="col-product">Producto</th>
                <th class="col-price">Precio</th>
                <th class="col-quantity">Cantidad</th>
                <th class="col-subtotal">Subtotal</th>
              </tr>
            </thead>
            <tbody id="cart-items-container">
              <!-- Inyectado por JS -->
            </tbody>
          </table>
        </div>

        <!-- Totals container -->
        <div class="cart-totals-wrapper">
          <h2>Total del carrito</h2>
          <div class="totals-row">
            <span>Subtotal</span>
            <span id="cart-subtotal">0.00 EUR</span>
          </div>
          <div class="totals-row totals-final">
            <span>Total</span>
            <span id="cart-total">0.00 EUR</span>
          </div>
          <a href="finalizar_compra.html" class="btn-sport btn-checkout">Pedir y pagar</a>
          <button id="clear-cart-btn" class="btn-clear-cart" type="button">Vaciar carrito</button>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/components/script_estructura.js"></script>
  <script src="/js/script_almacenamiento_autenticacion.js"></script>
  <script src="/js/script_carrito.js"></script>
  <script src="/js/components/script_footer.js"></script>
</body>

</html>
