<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/img/campusfp.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalle del Pedido — CampusFP</title>
<link rel="stylesheet" href="/css/order-detail.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
  <div id="layout-container">
    <!-- Navbar placeholder (if needed) -->
  </div>

  <div id="loading-container" class="text-center py-12 text-slate-600">
    Cargando detalle del pedido...
  </div>

  <div id="error-container" class="text-center py-12 text-red-600 hidden">
    Pedido no encontrado.
  </div>

  <div id="content-container" class="mx-auto max-w-5xl px-4 py-8 sm:py-10 hidden">
    <div class="flex flex-col gap-4 mb-8 sm:flex-row sm:justify-between sm:items-center">
      <div>
        <h1 id="order-title" class="text-3xl font-bold">Pedido #</h1>
        <p id="order-date" class="text-slate-500 mt-1">
          Realizado el -
        </p>
      </div>
      <a href="/mis_pedidos.html" class="text-blue-600 hover:underline inline-flex items-center gap-1">
        <i data-lucide="arrow-left" class="h-4 w-4"></i> Volver a mis pedidos
      </a>
    </div>

    <div class="bg-white border border-slate-200 rounded-3xl p-5 sm:p-8 shadow-sm">
      <div class="flex flex-col gap-5 mb-8 sm:flex-row sm:justify-between">
        <div>
          <p class="text-sm text-slate-500">Estado</p>
          <p id="order-status" class="text-xl font-semibold capitalize">-</p>
        </div>
        <div class="sm:text-right">
          <p class="text-sm text-slate-500">Total</p>
          <p id="order-total" class="text-3xl font-bold">0.00 €</p>
        </div>
      </div>

      <h2 class="text-xl font-semibold mb-4">Productos</h2>
      <div id="order-items" class="divide-y border-t border-slate-200">
        <!-- Products loaded by JS -->
      </div>
    </div>
  </div>

  <script src="js/almacenamiento_autenticacion.js"></script>
  <script src="js/script_detalle_pedido.js"></script>
</body>
</html>
