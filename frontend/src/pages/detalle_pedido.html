<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/img/sportshop.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalle del Pedido — SportShop</title>
  <link rel="stylesheet" href="/css/order-detail.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="layout-container"></div>

  <main class="orders-page order-detail-page">
    <section class="orders-shell">
      <header class="orders-header">
        <div>
          <p>Cuenta</p>
          <h1 id="order-title">Pedido #</h1>
          <span id="order-date" class="order-meta">Realizado el -</span>
        </div>
        <a href="mis_pedidos.html" class="orders-link">
          <i data-lucide="arrow-left"></i>
          Volver a mis pedidos
        </a>
      </header>

      <div id="loading-container" class="orders-state">Cargando detalle del pedido...</div>
      <div id="error-container" class="orders-state orders-error hidden">Pedido no encontrado.</div>

      <section id="content-container" class="hidden">
        <article class="order-card order-detail-card">
          <div class="order-detail-summary">
            <div>
              <span class="detail-label">Estado</span>
              <strong id="order-status" class="status-badge status-default">-</strong>
            </div>
            <div>
              <span class="detail-label">Total</span>
              <strong id="order-total" class="order-total">0.00 EUR</strong>
            </div>
          </div>

          <div class="order-table-heading">
            <div>
              <p>Detalle</p>
              <h2>Productos</h2>
            </div>
          </div>

          <div class="order-table-wrap">
            <table class="order-detail-table">
              <thead>
                <tr>
                  <th>Producto</th>
                  <th>Talla</th>
                  <th>Cantidad</th>
                  <th>Precio ud.</th>
                  <th>Subtotal</th>
                  <th>Estado pedido</th>
                  <th>Devolucion</th>
                </tr>
              </thead>
              <tbody id="order-items"></tbody>
            </table>
          </div>
        </article>
      </section>
    </section>
  </main>

  <script src="/js/components/script_estructura.js"></script>
  <script src="/js/script_almacenamiento_autenticacion.js"></script>
  <script src="/js/script_detalle_pedido.js"></script>
  <script src="/js/components/script_footer.js"></script>
</body>
</html>
