<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/img/campusfp.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusFP — Uniformes</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="/css/index.css" />
</head>
<body class="bg-slate-50">
  <div id="layout-container">
    <!-- Navbar placeholder (if needed) -->
  </div>

  <div class="min-h-[calc(100vh-(--spacing(32)))]">
    <section class="hero">
      <div class="mx-auto max-w-5xl px-4 text-center">
        <div class="mx-auto mb-6 flex h-24 w-52 items-center justify-center rounded-4xl bg-white px-5 shadow-2xl sm:h-32 sm:w-72">
          <img src="/img/campusfp.png" alt="CampusFP" class="max-h-16 w-full object-contain sm:max-h-24" />
        </div>
        <h1 class="mb-5 text-4xl font-black tracking-tight sm:text-6xl md:text-7xl">Bienvenido a Dotes</h1>
        <p class="mx-auto mb-8 max-w-3xl text-lg leading-8 text-blue-100 sm:text-xl md:text-2xl">
          Plataforma de gestión de uniformes para CampusFP.
        </p>

        <a
          id="btn-action"
          href="/login.html"
          class="btn-sport"
        >
          Iniciar sesión
        </a>
      </div>
    </section>

    <section class="mx-auto max-w-7xl px-4 py-10 sm:py-16">
      <h2 class="mb-8 text-center text-3xl font-black text-slate-900 sm:mb-12 sm:text-4xl">Elige tu ciclo formativo</h2>

      <div id="categorias-container" class="category-grid">
        <!-- Las categorías se cargarán aquí por JS -->
      </div>
    </section>
  </div>

  <script src="js/home.js"></script>
</body>
</html>
