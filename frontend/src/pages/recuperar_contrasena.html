<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/img/campusfp.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar Contraseña — CampusFP</title>
<link rel="stylesheet" href="/css/forgot-password.css" />
</head>
<body class="bg-slate-50">
  <div id="layout-container">
    <!-- Navbar placeholder (if needed) -->
  </div>

  <div class="min-h-[calc(100vh-(--spacing(32)))] flex items-center justify-center bg-gray-50 px-4 py-10">
    <div class="w-full max-w-sm rounded-lg bg-white p-6 shadow-md sm:p-8">
      <h2 class="mb-2 text-center text-2xl font-bold">Recuperar contraseña</h2>
      <p class="mb-6 text-center text-sm text-gray-600">
        Introduce tu email registrado y te enviaremos un código de verificación.
      </p>

      <form id="forgot-password-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input
            type="email"
            id="email"
            class="w-full rounded-lg border p-3 focus:ring-2 focus:ring-blue-500 outline-none transition"
            autocomplete="email"
            required
          />
          <p id="error-message" class="mt-2 text-sm text-red-500 hidden"></p>
        </div>

        <p id="success-message" class="rounded-lg bg-green-50 p-3 text-center text-sm text-green-700 hidden"></p>

        <button
          type="submit"
          id="btn-submit"
          class="w-full rounded-lg bg-blue-600 py-3 text-white disabled:opacity-70 transition hover:bg-blue-700 cursor-pointer disabled:cursor-not-allowed"
        >
          Enviar código
        </button>
      </form>

      <p class="mt-4 text-center text-sm text-gray-600">
        <a href="/iniciar_sesion.html" class="text-blue-600 hover:underline">
          Volver al inicio de sesión
        </a>
      </p>
    </div>
  </div>

  <script src="js/script_recuperar_contrasena.js"></script>
</body>
</html>
