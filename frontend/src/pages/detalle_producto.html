<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/img/sportshop.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalle del Producto — SportShop</title>
<link rel="stylesheet" href="/css/product-detail.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
  <div id="layout-container">
    <!-- Navbar placeholder (if needed) -->
  </div>

  <div id="loading-container" class="mx-auto max-w-7xl px-4 py-12 text-center text-lg text-gray-600">
    Cargando producto...
  </div>

  <div id="error-container" class="mx-auto max-w-7xl px-4 py-12 text-center text-lg text-red-600 hidden">
    Error: Producto no encontrado
  </div>

  <div id="product-container" class="mx-auto max-w-7xl px-4 py-10 hidden">
    <a
      id="back-link"
      href="/"
      class="mb-8 inline-flex items-center gap-2 text-sm font-semibold text-slate-600 hover:text-slate-900"
    >
      <i data-lucide="arrow-left" class="h-4 w-4"></i>
      Volver al catálogo
    </a>

    <div class="grid gap-10 lg:grid-cols-[minmax(0,1.1fr)_minmax(360px,0.9fr)]">
      <div>
        <div class="flex aspect-4/3 items-center justify-center overflow-hidden rounded-xl bg-slate-100">
          <img id="main-product-image" src="" alt="Producto" class="h-full w-full object-cover hidden" />
          <span id="main-product-placeholder" class="px-8 text-center text-2xl font-semibold text-slate-500">Producto</span>
        </div>

        <div id="gallery-container" class="mt-4 grid grid-cols-4 gap-3 sm:grid-cols-6 hidden">
          <!-- Gallery images loaded by JS -->
        </div>
      </div>

      <div>
        <p id="product-category" class="text-sm font-semibold uppercase text-slate-500">-</p>
        <h1 id="product-title" class="mt-3 text-4xl font-bold text-slate-900">-</h1>
        <p id="product-type" class="mt-3 text-lg text-slate-600">-</p>

        <div class="mt-8 flex flex-wrap items-end gap-4">
          <span id="product-price" class="text-4xl font-bold text-slate-900">0.00 EUR</span>
          <span id="product-stock" class="rounded-full bg-slate-100 px-4 py-2 text-sm font-semibold text-slate-700">
            Stock 0
          </span>
        </div>

        <div class="mt-8 max-w-sm">
          <label for="product-size" class="text-sm font-semibold uppercase text-slate-600">
            Talla
          </label>
          <select
            id="product-size"
            class="mt-2 w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-slate-900 outline-none focus:border-blue-500"
          >
            <option value="">Seleccionar talla</option>
          </select>
          <p id="size-error" class="mt-2 text-sm font-semibold text-red-600 hidden"></p>
        </div>

        <button
          type="button"
          id="btn-add-cart"
          class="mt-8 inline-flex w-full items-center justify-center gap-2 rounded-xl bg-slate-900 px-6 py-4 font-semibold text-white transition hover:bg-slate-800 sm:w-auto cursor-pointer"
        >
          <i data-lucide="shopping-bag" class="h-5 w-5"></i>
          Añadir al carrito
        </button>

        <div class="mt-10 space-y-6 border-t border-slate-200 pt-8">
          <section>
            <h2 class="text-xl font-bold text-slate-900">Descripción</h2>
            <p id="product-description" class="mt-3 leading-7 text-slate-600">-</p>
          </section>

          <dl class="grid gap-4 sm:grid-cols-2">
            <div>
              <dt class="text-sm font-semibold text-slate-500">Color</dt>
              <dd id="product-color" class="mt-1 text-slate-900">No indicado</dd>
            </div>
            <div>
              <dt class="text-sm font-semibold text-slate-500">Composición</dt>
              <dd id="product-composition" class="mt-1 text-slate-900">No indicada</dd>
            </div>
            <div>
              <dt class="text-sm font-semibold text-slate-500">Normativa</dt>
              <dd id="product-norm" class="mt-1 text-slate-900">No indicada</dd>
            </div>
            <div>
              <dt class="text-sm font-semibold text-slate-500">Lavado</dt>
              <dd id="product-wash" class="mt-1 text-slate-900">No indicado</dd>
            </div>
          </dl>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Producto Añadido -->
  <div id="added-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 hidden">
    <div class="mx-4 w-full max-w-md rounded-2xl bg-white p-10 text-center shadow-xl">
      <h2 class="mb-4 text-2xl font-bold text-slate-900">¡Producto añadido!</h2>
      <p id="added-product-name" class="mb-8 text-gray-600 font-medium"></p>
      <div class="flex flex-col gap-4">
        <a href="/finalizar_compra.html" class="w-full rounded-xl bg-slate-900 px-6 py-4 text-center font-semibold text-white transition hover:bg-slate-800">
          Ir al carrito
        </a>
        <button id="btn-close-added-modal" class="w-full rounded-xl border border-slate-200 bg-white px-6 py-4 font-semibold text-slate-700 transition hover:bg-slate-50 cursor-pointer">
          Seguir comprando
        </button>
      </div>
    </div>
  </div>

  <script src="/js/components/estructura.js"></script>
  <script src="/js/script_almacenamiento_autenticacion.js"></script>
  <script src="/js/script_detalle_producto.js"></script>
  <script src="/js/components/footer.js"></script>
</body>
</html>
