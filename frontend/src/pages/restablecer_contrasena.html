<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/img/sportshop.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer Contraseña — SportShop</title>
<link rel="stylesheet" href="/css/reset-password.css" />
</head>
<body class="bg-slate-50">
  <div id="layout-container">
    <!-- Navbar placeholder (if needed) -->
  </div>

  <div class="min-h-[calc(100vh-(--spacing(32)))] flex items-center justify-center bg-gray-50 px-4 py-10">
    <div class="w-full max-w-sm rounded-lg bg-white p-6 shadow-md sm:p-8">
      <h2 class="mb-2 text-center text-2xl font-bold">Nueva contraseña</h2>
      <p class="mb-6 text-center text-sm text-gray-600">
        Escribe el código recibido por email y crea una contraseña nueva.
      </p>

      <form id="reset-password-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input
            type="email"
            id="email"
            class="w-full rounded-lg border p-3 focus:ring-2 focus:ring-blue-500 outline-none transition"
            autocomplete="email"
            required
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Código de verificación</label>
          <input
            type="text"
            id="code"
            inputmode="numeric"
            maxlength="6"
            class="w-full rounded-lg border p-3 tracking-[0.2em] focus:ring-2 focus:ring-blue-500 outline-none transition"
            autocomplete="one-time-code"
            required
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nueva contraseña</label>
          <input
            type="password"
            id="newPassword"
            class="w-full rounded-lg border p-3 focus:ring-2 focus:ring-blue-500 outline-none transition"
            autocomplete="new-password"
            required
          />
          <p class="mt-2 text-xs text-gray-600">
            Mínimo 8 caracteres, una mayúscula, una minúscula y un número.
          </p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Confirmar contraseña</label>
          <input
            type="password"
            id="confirmPassword"
            class="w-full rounded-lg border p-3 focus:ring-2 focus:ring-blue-500 outline-none transition"
            autocomplete="new-password"
            required
          />
        </div>

        <p id="error-message" class="rounded-lg bg-red-50 p-3 text-center text-sm text-red-600 hidden"></p>
        <p id="success-message" class="rounded-lg bg-green-50 p-3 text-center text-sm text-green-700 hidden"></p>

        <button
          type="submit"
          id="btn-submit"
          class="w-full rounded-lg bg-blue-600 py-3 text-white disabled:opacity-70 transition hover:bg-blue-700 cursor-pointer disabled:cursor-not-allowed"
        >
          Cambiar contraseña
        </button>
      </form>

      <p class="mt-4 text-center text-sm text-gray-600">
        <a href="/recuperar_contrasena.html" class="text-blue-600 hover:underline">
          Solicitar otro código
        </a>
      </p>
    </div>
  </div>

  <script src="/js/script_restablecer_contrasena.js"></script>
  <script src="/js/components/estructura.js"></script>
  <script src="/js/components/footer.js"></script>
</body>
</html>
