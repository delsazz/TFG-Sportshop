<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/img/campusfp.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro — CampusFP</title>
<link rel="stylesheet" href="/css/register.css" />
</head>
<body class="bg-slate-50">
  <div id="layout-container">
    <!-- Navbar placeholder (if needed) -->
  </div>

  <div class="min-h-[calc(100vh-(--spacing(32)))] flex items-center justify-center bg-gray-50 px-4 py-10 sm:py-12">
    <div class="bg-white p-6 rounded-lg shadow-md w-full max-w-2xl sm:p-8">
      <h2 class="text-2xl font-bold text-center mb-6">Registro de usuario</h2>
      <form id="register-form" class="space-y-4">
        <div>
          <label for="nombre" class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
          <input
              id="nombre"
              name="nombre"
              type="text"
              class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              required
          />
        </div>
        <div>
          <label for="apellidos" class="block text-sm font-medium text-gray-700 mb-1">Apellidos</label>
          <input
              id="apellidos"
              name="apellidos"
              type="text"
              class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              required
          />
        </div>
        <div>
          <label for="telefono" class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
          <input
              id="telefono"
              name="telefono"
              type="tel"
              pattern="[0-9]{7,15}"
              placeholder="Solo números"
              class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          />
        </div>
        <div class="rounded-lg border border-gray-200 bg-gray-50 p-4">
          <h3 class="text-sm font-semibold text-gray-900">Dirección de envío</h3>
          <div class="mt-4 grid gap-4 sm:grid-cols-6">
            <div class="sm:col-span-4">
              <label for="direccionCalle" class="block text-sm font-medium text-gray-700 mb-1">Calle</label>
              <input
                  id="direccionCalle"
                  name="direccionCalle"
                  type="text"
                  placeholder="Calle Principal"
                  class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              />
            </div>
            <div class="sm:col-span-2">
              <label for="direccionNumero" class="block text-sm font-medium text-gray-700 mb-1">Portal / número</label>
              <input
                  id="direccionNumero"
                  name="direccionNumero"
                  type="text"
                  placeholder="12B"
                  class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              />
            </div>
            <div class="sm:col-span-2">
              <label for="direccionPiso" class="block text-sm font-medium text-gray-700 mb-1">Piso (opcional)</label>
              <input
                  id="direccionPiso"
                  name="direccionPiso"
                  type="text"
                  placeholder="2º A"
                  class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              />
            </div>
            <div class="sm:col-span-2">
              <label for="direccionCiudad" class="block text-sm font-medium text-gray-700 mb-1">Ciudad</label>
              <input
                  id="direccionCiudad"
                  name="direccionCiudad"
                  type="text"
                  placeholder="Madrid"
                  class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              />
            </div>
            <div class="sm:col-span-2">
              <label for="direccionProvincia" class="block text-sm font-medium text-gray-700 mb-1">Provincia</label>
              <input
                  id="direccionProvincia"
                  name="direccionProvincia"
                  type="text"
                  placeholder="Madrid"
                  class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              />
            </div>
            <div class="sm:col-span-2">
              <label for="codigoPostal" class="block text-sm font-medium text-gray-700 mb-1">Código postal</label>
              <input
                  id="codigoPostal"
                  name="codigoPostal"
                  type="text"
                  inputmode="numeric"
                  pattern="[0-9]{5}"
                  maxlength="5"
                  placeholder="28001"
                  class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              />
            </div>
          </div>
        </div>
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
          <input
              id="email"
              name="email"
              type="email"
              class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              required
          />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
          <input
              id="password"
              name="password"
              type="password"
              class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              required
          />
          <p class="text-xs text-gray-500 mt-1">Mínimo 8 caracteres, con mayúscula, minúscula y número.</p>
        </div>
        <div>
          <label for="ciclo" class="block text-sm font-medium text-gray-700 mb-1">Ciclo formativo</label>
          <select
              id="ciclo"
              name="ciclo"
              class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              required
          >
            <option value="">Selecciona tu ciclo</option>
            <option value="proteccion-civil">Protección Civil</option>
            <option value="emergencias-sanitarias">Emergencias Sanitarias</option>
            <option value="laboratorio">Laboratorio</option>
          </select>
        </div>
        
        <p id="error-message" class="text-red-500 text-sm text-center hidden"></p>
        
        <button
            type="submit"
            class="w-full bg-blue-600 text-white py-3 rounded hover:bg-blue-700 transition-colors cursor-pointer"
        >
          Registrarse
        </button>
      </form>
      <p class="text-center mt-4 text-gray-600 text-sm">
        ¿Ya tienes cuenta? 
        <a href="/iniciar_sesion.html" class="text-blue-600 hover:underline">Inicia sesión aquí</a>
      </p>
    </div>
  </div>

  <script src="js/script_registro.js"></script>
</body>
</html>
