<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/img/campusfp.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro — CampusFP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/register.css" />
</head>

<body class="bg-slate-50">

  <div id="layout-container"></div>

  <div class="min-h-[calc(100vh-128px)] flex items-center justify-center bg-gray-50 px-4 py-10 sm:py-12">

    <div class="bg-white p-6 rounded-lg shadow-md w-full max-w-2xl sm:p-8">

      <h2 class="text-2xl font-bold text-center mb-6">Registro de usuario</h2>

      <form id="register-form" class="space-y-4">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
          <input id="nombre" type="text" class="w-full px-3 py-2 border border-gray-300 rounded" required />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Apellidos</label>
          <input id="apellidos" type="text" class="w-full px-3 py-2 border border-gray-300 rounded" required />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
          <input id="telefono" type="tel" pattern="[0-9]{7,15}" class="w-full px-3 py-2 border border-gray-300 rounded" />
        </div>

        <div class="rounded-lg border border-gray-200 bg-gray-50 p-4">
          <h3 class="text-sm font-semibold text-gray-900">Dirección de envío</h3>

          <div class="mt-4 grid gap-4 sm:grid-cols-6">

            <!-- COMUNIDAD -->
            <div class="sm:col-span-6">
              <label class="block text-sm font-medium text-gray-700 mb-1">Comunidad Autónoma</label>
              <select id="comunidad" class="w-full px-3 py-2 border border-gray-300 rounded">
                <option value="">Selecciona comunidad</option>
              </select>
            </div>

            <!-- PROVINCIA -->
            <div class="sm:col-span-3">
              <label class="block text-sm font-medium text-gray-700 mb-1">Provincia</label>
              <select id="direccionProvincia" class="w-full px-3 py-2 border border-gray-300 rounded" disabled>
                <option value="">Selecciona comunidad primero</option>
              </select>
            </div>

            <!-- CIUDAD -->
            <div class="sm:col-span-3">
              <label class="block text-sm font-medium text-gray-700 mb-1">Ciudad</label>
              <select id="direccionCiudad" class="w-full px-3 py-2 border border-gray-300 rounded" disabled>
                <option value="">Selecciona provincia primero</option>
              </select>
            </div>

            <div id="otraCiudadContainer" class="sm:col-span-6 hidden">
              <label class="block text-sm font-medium text-gray-700 mb-1">Otra ciudad</label>
              <input id="direccionCiudadOtra" type="text" class="w-full px-3 py-2 border border-gray-300 rounded" />
            </div>

            <div class="sm:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1">Calle</label>
              <input id="direccionCalle" type="text" class="w-full px-3 py-2 border border-gray-300 rounded" />
            </div>

            <div class="sm:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1">Número</label>
              <input id="direccionNumero" type="text" class="w-full px-3 py-2 border border-gray-300 rounded" />
            </div>

            <div class="sm:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1">Piso</label>
              <input id="direccionPiso" type="text" class="w-full px-3 py-2 border border-gray-300 rounded" />
            </div>

            <div class="sm:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1">Código postal</label>
              <input id="codigoPostal" type="text" maxlength="5" class="w-full px-3 py-2 border border-gray-300 rounded" />
            </div>

          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input id="email" type="email" class="w-full px-3 py-2 border border-gray-300 rounded" required />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
          <input id="password" type="password" class="w-full px-3 py-2 border border-gray-300 rounded" required />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Ciclo</label>
          <select id="ciclo" class="w-full px-3 py-2 border border-gray-300 rounded" required>
            <option value="">Selecciona ciclo</option>
            <option value="proteccion-civil">Protección Civil</option>
            <option value="emergencias-sanitarias">Emergencias Sanitarias</option>
            <option value="sanidad">Sanidad</option>
          </select>
        </div>

        <div class="flex items-start gap-2">
          <input id="aceptoTerminos" type="checkbox" class="mt-1 h-4 w-4" required />
          <label class="text-sm text-gray-700">
            Acepto los términos y condiciones
          </label>
        </div>

        <p id="error-message" class="text-red-500 text-sm text-center hidden"></p>

        <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded">
          Registrarse
        </button>

      </form>

      <p class="text-center mt-4 text-gray-600 text-sm">
        ¿Ya tienes una cuenta?
        <a href="/iniciar_sesion.html" class="text-blue-600 hover:underline">
          Inicia sesión aquí
        </a>
      </p>

    </div>
  </div>
  <script src="/js/script_registro.js"></script>
</body>
</html>
