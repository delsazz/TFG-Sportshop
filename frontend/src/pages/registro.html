<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/img/sportshop.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro — SportShop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/register.css" />
</head>

<body class="bg-slate-50">

  <div id="layout-container"></div>

  <div class="min-h-[calc(100vh-128px)] flex items-center justify-center bg-gray-50 px-4 py-10 sm:py-12">

    <div class="bg-white registro-page p-6 rounded-lg shadow-md w-full max-w-2xl sm:p-8">

      <h2 class="text-2xl font-bold text-center mb-6">Registro de usuario</h2>

      <form id="register-form" class="space-y-4">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
          <input id="nombre" name="nombre" type="text" class="w-full px-3 py-2 border border-gray-300 rounded"
            required />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Apellidos</label>
          <input id="apellidos" name="apellidos" type="text" class="w-full px-3 py-2 border border-gray-300 rounded"
            required />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
          <input id="telefono" name="telefono" type="tel" pattern="[0-9]{7,15}"
            class="w-full px-3 py-2 border border-gray-300 rounded" />
        </div>

        <div class="rounded-lg border border-gray-200 bg-gray-50 p-4">
          <h3 class="text-sm font-semibold text-gray-900">Dirección de envío</h3>

          <div class="mt-4 grid gap-4 sm:grid-cols-6">

            <!-- COMUNIDAD -->
            <div class="sm:col-span-6">
              <label class="block text-sm font-medium text-gray-700 mb-1">Comunidad Autónoma</label>
              <select id="direccionComunidad" name="direccionComunidad"
                class="w-full px-3 py-2 border border-gray-300 rounded">
                <option value="">Selecciona comunidad</option>
              </select>
            </div>

            <!-- PROVINCIA -->
            <div class="sm:col-span-3">
              <label class="block text-sm font-medium text-gray-700 mb-1">Provincia</label>
              <select id="direccionProvincia" name="direccionProvincia"
                class="w-full px-3 py-2 border border-gray-300 rounded" disabled>
                <option value="">Selecciona comunidad primero</option>
              </select>
            </div>

            <!-- CIUDAD -->
            <div class="sm:col-span-3">
              <label class="block text-sm font-medium text-gray-700 mb-1">Ciudad</label>
              <select id="direccionCiudad" name="direccionCiudad"
                class="w-full px-3 py-2 border border-gray-300 rounded" disabled>
                <option value="">Selecciona provincia primero</option>
              </select>
            </div>

            <div id="otraCiudadContainer" class="sm:col-span-6 hidden">
              <label class="block text-sm font-medium text-gray-700 mb-1">Otra ciudad</label>
              <input id="direccionCiudadOtra" name="direccionCiudadOtra" type="text"
                class="w-full px-3 py-2 border border-gray-300 rounded" />
            </div>

            <div class="sm:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1">Calle</label>
              <input id="direccionCalle" name="direccionCalle" type="text"
                class="w-full px-3 py-2 border border-gray-300 rounded" />
            </div>

            <div class="sm:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1">Número</label>
              <input id="direccionNumero" name="direccionNumero" type="text"
                class="w-full px-3 py-2 border border-gray-300 rounded" />
            </div>

            <div class="sm:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1">Piso</label>
              <input id="direccionPiso" name="direccionPiso" type="text"
                class="w-full px-3 py-2 border border-gray-300 rounded" />
            </div>

            <div class="sm:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1">Código postal</label>
              <input id="codigoPostal" name="codigoPostal" type="text" maxlength="5"
                class="w-full px-3 py-2 border border-gray-300 rounded" />
            </div>

          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input id="email" name="email" type="email" class="w-full px-3 py-2 border border-gray-300 rounded"
            required />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
          <input id="password" name="password" type="password" class="w-full px-3 py-2 border border-gray-300 rounded"
            required />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Ciclo</label>
          <select id="ciclo" name="ciclo" class="w-full px-3 py-2 border border-gray-300 rounded" required>
            <option value="">Selecciona ciclo</option>
            <option value="proteccion-civil">Protección Civil</option>
            <option value="emergencias-sanitarias">Emergencias Sanitarias</option>
            <option value="sanidad">Sanidad</option>
          </select>
        </div>

        <div class="flex items-start gap-2">
          <input id="aceptoTerminos" name="aceptoTerminos" type="checkbox" class="mt-1 h-4 w-4" required />
          <label class="text-sm text-gray-700">
            Acepto los términos y condiciones
          </label>
        </div>

        <div class="rounded-lg border border-gray-200 bg-gray-50 p-4">
          <label class="flex cursor-pointer items-center gap-3 text-sm font-semibold text-gray-800">
            <input id="captchaCheckbox" type="checkbox" class="h-5 w-5 rounded border-gray-300" />
            <span id="captchaLabel">No soy un robot</span>
            <span id="captchaTick" class="hidden ml-auto rounded-full bg-green-100 px-2 py-1 text-green-700">✓</span>
          </label>
          <div id="captchaChallenge" class="mt-4 hidden rounded border border-gray-200 bg-white p-4">
            <p id="captchaQuestion" class="mb-3 text-sm text-gray-700"></p>
            <div class="flex gap-3">
              <input id="captchaAnswer" type="text" inputmode="numeric"
                class="flex-1 rounded border border-gray-300 px-3 py-2" />
              <button id="captchaVerify" type="button"
                class="rounded bg-blue-600 px-4 py-2 text-white">Verificar</button>
            </div>
          </div>
        </div>

        <p id="error-message" class="text-red-500 text-sm text-center hidden"></p>

        <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded">
          Registrarse
        </button>

      </form>

      <p class="text-center mt-4 text-gray-600 text-sm">
        ¿Ya tienes una cuenta?
        <a href="/iniciar_sesion.html" class="text-blue-600 hover:underline">
          Inicia sesión aquí
        </a>
      </p>

    </div>
  </div>
  <script src="/js/script_registro.js"></script>
</body>

</html>
