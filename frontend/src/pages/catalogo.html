<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/img/sportshop.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo - SportShop</title>
  <link rel="stylesheet" href="/css/catalogo.css" />
</head>

<body class="bg-slate-50">
  <div id="layout-container">
  </div>

  <div id="loading" class="mx-auto max-w-7xl px-4 py-12 text-center text-lg text-gray-600">
    Cargando productos...
  </div>

  <div id="error" class="hidden mx-auto max-w-7xl px-4 py-12 text-center text-lg text-red-600">
    Error cargando categoria
  </div>

  <div id="catalog-content" class="hidden mx-auto max-w-7xl px-4 py-12">
    <div class="mb-10 overflow-hidden rounded-3xl bg-white shadow-lg">
      <img id="categoria-img" src="" alt="Categoria" class="h-72 w-full object-cover hidden" />
      <div class="p-8">
        <h1 id="categoria-nombre" class="text-4xl font-bold text-slate-900"></h1>
        <p id="categoria-desc" class="mt-3 text-lg text-gray-600"></p>
      </div>
    </div>

    <div id="products-grid" class="grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-3">
    </div>

    <div id="added-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60">
      <div class="mx-4 w-full max-w-md rounded-2xl bg-white p-10 text-center">
        <div class="mb-6 text-6xl">✅</div>
        <h2 class="mb-4 text-2xl font-bold">Añadido al carrito</h2>
        <p id="added-product-name" class="mb-8 text-gray-600"></p>
        <div class="flex flex-col justify-center gap-4 sm:flex-row">
          <button id="close-added-modal"
            class="rounded-xl border border-slate-900 bg-white px-8 py-3.5 font-medium text-slate-900 hover:bg-slate-50">
            Seguir comprando
          </button>
          <a href="/finalizar_compra.html"
            class="rounded-xl bg-slate-900 px-8 py-3.5 font-medium text-white hover:bg-slate-800">
            Ver carrito
          </a>
        </div>
      </div>
    </div>
  </div>
  <script src="/js/components/estructura.js"></script>
  <script src="/js/script_almacenamiento_autenticacion.js"></script>
  <script src="/js/script_catalogo.js"></script>
  <script src="/js/components/footer.js"></script>
</body>

</html>
