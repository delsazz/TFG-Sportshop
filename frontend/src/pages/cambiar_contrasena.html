<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/img/sportshop.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cambiar Contraseña — SportShop</title>
<link rel="stylesheet" href="/css/change-password.css" />
</head>
<body class="bg-slate-50">
  <div id="layout-container">
    <!-- Navbar placeholder (if needed) -->
  </div>

  <div class="px-4 py-12">
    <div class="max-w-md mx-auto bg-white p-6 sm:p-8 rounded-[1.5rem] shadow-sm ring-1 ring-slate-200">
      <h1 class="text-3xl font-bold mb-8 text-slate-900">Cambiar Contraseña</h1>

      <div id="message-container" class="mb-6 p-4 rounded-2xl hidden"></div>

      <form id="change-password-form" class="space-y-6">
        <div>
          <label class="block text-sm font-medium mb-2 text-slate-700">Contraseña actual</label>
          <input
            type="password"
            id="currentPassword"
            class="w-full px-4 py-3 border border-slate-300 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition"
            required
          />
        </div>

        <div>
          <label class="block text-sm font-medium mb-2 text-slate-700">Nueva contraseña</label>
          <input
            type="password"
            id="newPassword"
            class="w-full px-4 py-3 border border-slate-300 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition"
            required
          />
        </div>

        <div>
          <label class="block text-sm font-medium mb-2 text-slate-700">Confirmar nueva contraseña</label>
          <input
            type="password"
            id="confirmPassword"
            class="w-full px-4 py-3 border border-slate-300 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition"
            required
          />
        </div>

        <button
          type="submit"
          id="btn-submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl transition cursor-pointer disabled:cursor-not-allowed disabled:opacity-70"
        >
          Cambiar contraseña
        </button>
      </form>
    </div>
  </div>

  <script src="js/almacenamiento_autenticacion.js"></script>
  <script src="js/script_cambiar_contrasena.js"></script>
</body>
</html>
