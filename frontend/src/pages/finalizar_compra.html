<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/img/sportshop.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finalizar compra - SportShop</title>
  <link rel="stylesheet" href="/css/checkout.css" />
</head>
<body>
  <div id="layout-container">
    <!-- Navbar placeholder -->
  </div>

  <main class="checkout-main-container container">
    <div id="empty-state" class="checkout-empty-state hidden">
      <p class="subtitle">Checkout</p>
      <h1>Tu carrito está vacío</h1>
      <p>No hay productos pendientes de confirmar.</p>
      <a href="/inicio.html" class="btn-sport btn-empty-cart">Volver al catálogo</a>
    </div>

    <div id="checkout-content" class="checkout-content hidden">
      <div class="checkout-form-wrapper">
        <div class="checkout-form-header">
           <span class="step-number">3</span>
           <h2>Método de pago:</h2>
        </div>
        
        <form id="checkout-form" class="checkout-form">
          <div id="error-message" class="error-msg hidden"></div>
          
          <div id="payment-options" class="payment-options-list">
            <!-- Payment methods injected by JS -->
          </div>

          <button id="submit-btn" type="submit" class="btn-sport btn-submit">
            Confirmar pedido
          </button>
        </form>
      </div>
    </div>
  </main>

  <script src="/js/components/script_estructura.js"></script>
  <script src="/js/script_almacenamiento_autenticacion.js"></script>
  <script src="/js/script_finalizar_compra.js"></script>
  <script src="/js/components/script_footer.js"></script>
</body>
</html>
