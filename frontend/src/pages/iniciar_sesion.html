<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/img/sportshop.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión - SportShop</title>
<link rel="stylesheet" href="/css/login.css" />
</head>
<body class="bg-gray-50">
  <div id="layout-container">
    <!-- Navbar placeholder (if needed) -->
  </div>

  <div class="min-h-[calc(100vh-(--spacing(32)))] flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-sm rounded-lg bg-white p-6 shadow-md sm:p-8">
      <h2 class="mb-6 text-center text-2xl font-bold">Iniciar sesión</h2>

      <p id="msg-registered" class="text-green-600 text-center mb-4 hidden">Registro completado con éxito. Por favor inicia sesión.</p>

      <form id="login-form" class="space-y-4">
        <div>
          <label for="email">Email</label>
          <input
            id="email"
            type="text"
            class="w-full rounded-lg border p-3"
          />
          <p id="error-email" class="text-red-500 hidden"></p>
        </div>

        <div>
          <div class="mb-1 flex items-center justify-between gap-3">
            <label for="password">Contraseña</label>
            <a href="/recuperar_contrasena.html" class="text-sm text-blue-600">
              ¿Olvidaste tu contraseña?
            </a>
          </div>
          <input
            id="password"
            type="password"
            class="w-full rounded-lg border p-3"
          />
          <p id="error-password" class="text-red-500 hidden"></p>
        </div>

        <p id="error-general" class="text-red-500 text-center hidden"></p>

        <button type="submit" class="w-full rounded-lg bg-blue-600 py-3 text-white transition-colors hover:bg-blue-700">
          Ingresar
        </button>
      </form>

      <p class="mt-4 text-center text-sm text-gray-600">
        ¿No tienes cuenta? 
        <a href="/registro.html" class="text-blue-600 hover:underline">
          Regístrate
        </a>
      </p>
    </div>
  </div>

  <script src="js/almacenamiento_autenticacion.js"></script>
  <script src="js/script_iniciar_sesion.js"></script>
</body>
</html>
