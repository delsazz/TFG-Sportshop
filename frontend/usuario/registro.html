<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - SportShop</title>
    <link  rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/estilos_registro.css">
</head>
<body>
<div class="container registro-container">
    <div class="registro-box">
        <h2 class="titulo-registro">Crear una cuenta</h2>

        <div th:if="${error}" id="errorAlert" class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${error}"></span>
        </div>
        <div th:if="${param.registrado}" id="successAlert" class="alert alert-success" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i> Usuario registrado correctamente. Redirigiendo a inicio de sesión...
        </div>

        <form id="registroForm" action="/registro" method="post" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" id="nombre" name="nombre" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="apellidos" class="form-label">Apellidos</label>
                <input type="text" id="apellidos" name="apellidos" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Correo electrónico</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control" required>
                <div class="form-check mt-2">
                    <input class="form-check-input" type="checkbox" id="showPassword">
                    <label class="form-check-label" for="showPassword">
                        Mostrar contraseña
                    </label>
                </div>
            </div>

            <div class="mb-3">
                <label for="nif" class="form-label">NIF</label>
                <input type="text" id="nif" name="nif" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="pais" class="form-label">País</label>
                <select id="pais" name="pais" class="form-select" required>
                    <option value="">Selecciona un país</option>
                    <option value="España">España</option>
                    <option value="Francia">Francia</option>
                    <option value="Italia">Italia</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="ciudad" class="form-label">Ciudad</label>
                <input type="text" id="ciudad" name="ciudad" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="codigoPostal" class="form-label">Código Postal</label>
                <input type="text" id="codigoPostal" name="codigoPostal" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="direccion" class="form-label">Dirección</label>
                <input type="text" id="direccion" name="direccion" class="form-control" required>
            </div>

            <button id="registroButton" type="submit" class="btn btn-primary">
                <i class="bi bi-person-plus me-2"></i>Crear cuenta
            </button>

            <p class="mt-3 text-center">
                ¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a>
            </p>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/JavaScript/registro.js"></script>
</body>
</html>
