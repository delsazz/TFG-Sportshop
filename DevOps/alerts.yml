groups:
  - name: container-availability
    rules:
      - alert: ContainerNoMetrics
        expr: absent(container_last_seen{name=~".+"})
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "No hay metricas de contenedores"
          description: "cAdvisor no esta reportando contenedores. Revisa cadvisor y el socket de Docker."

      - alert: ContainerDown
        expr: time() - container_last_seen{name=~".+"} > 60
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Contenedor sin respuesta: {{ $labels.name }}"
          description: "El contenedor {{ $labels.name }} lleva mas de 60 segundos sin reportar metricas."

      - alert: ExpectedContainerMissing
        expr: absent(container_last_seen{name=~".*nginx.*"})
        for: 1m
        labels:
          severity: critical
          expected_service: nginx
        annotations:
          summary: "Falta el contenedor {{ $labels.expected_service }}"
          description: "El servicio esperado {{ $labels.expected_service }} no aparece en cAdvisor."

      - alert: ExpectedContainerMissing
        expr: absent(container_last_seen{name=~".*frontend.*"})
        for: 1m
        labels:
          severity: critical
          expected_service: frontend
        annotations:
          summary: "Falta el contenedor {{ $labels.expected_service }}"
          description: "El servicio esperado {{ $labels.expected_service }} no aparece en cAdvisor."

