          severity: critical
        annotations:
          summary: "Endpoint no responde: {{ $labels.instance }}"
          description: "Blackbox no recibe HTTP 2xx desde {{ $labels.instance }}."

      - alert: TargetDown
        expr: up == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Target Prometheus caido: {{ $labels.job }} {{ $labels.instance }}"
          description: "Prometheus no puede scrapear {{ $labels.job }} en {{ $labels.instance }}."
