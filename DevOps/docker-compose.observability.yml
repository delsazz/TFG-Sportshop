x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"
    labels: "com.docker.compose.service,com.docker.compose.project"

services:
  nginx:
    logging: *default-logging
    labels:
      logging: "promtail"

  frontend:
    logging: *default-logging
    labels:
      logging: "promtail"

  admin:
    logging: *default-logging
    labels:
      logging: "promtail"

  backend:
    logging: *default-logging
    labels:
      logging: "promtail"

  database:
    logging: *default-logging
    labels:
      logging: "promtail"

  loki:
    image: grafana/loki:2.9.8
    command: -config.file=/etc/loki/local-config.yml
    volumes:
      - ./DevOps/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - dotes-net
    labels:
      logging: "promtail"
    restart: unless-stopped
    logging: *default-logging

  promtail:
    image: grafana/promtail:2.9.8
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./DevOps/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - dotes-net
    labels:
      logging: "promtail"
    restart: unless-stopped
    logging: *default-logging

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./DevOps/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./DevOps/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - alertmanager
      - cadvisor
      - blackbox
      - postgres-exporter
    networks:
      - dotes-net
    labels:
      logging: "promtail"
    restart: unless-stopped
    logging: *default-logging

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command: --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./DevOps/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dotes-net
    labels:
      logging: "promtail"
    restart: unless-stopped
    logging: *default-logging

  grafana:
    image: grafana/grafana:11.1.4
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./DevOps/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./DevOps/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3002:3000"
    depends_on:
      - loki
      - prometheus
    networks:
      - dotes-net
    labels:
      logging: "promtail"
    restart: unless-stopped
    logging: *default-logging

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - dotes-net
    labels:
      logging: "promtail"
    restart: unless-stopped
    logging: *default-logging

  blackbox:
    image: quay.io/prometheus/blackbox-exporter:v0.25.0
    command: --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ./DevOps/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - dotes-net
    labels:
      logging: "promtail"
    restart: unless-stopped
    logging: *default-logging

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER:-uniformes}:${DB_PASS:-uniformes_pass}@database:5432/${DB_NAME:-uniformes}?sslmode=disable"
    depends_on:
      - database
    networks:
      - dotes-net
    labels:
      logging: "promtail"
    restart: unless-stopped
    logging: *default-logging

volumes:
  loki_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:
