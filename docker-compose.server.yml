version: '3.9'

services:
  nginx:
    image: nginx:alpine
    container_name: nginx_sportshop_server
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.server.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - frontend
      - admin
      - backend
      - database
    networks:
      - sportshop-net
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BASE: ${VITE_BASE:-/}
      dockerfile: Dockerfile
    container_name: frontend_sportshop_server
    expose:
      - "3000"
    environment:
      - VITE_API_URL=/api
    networks:
      - sportshop-net
    restart: always

  admin:
    build:
      context: ./admin
      args:
        VITE_BASE: ${VITE_BASE_ADMIN:-/admin/}
      dockerfile: Dockerfile
    container_name: admin_sportshop_server
    expose:
      - "3001"
    environment:
      - VITE_API_URL=/api
    networks:
      - sportshop-net
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_sportshop_server
    expose:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://database:3306/sportshop?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Madrid
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-curso}
      JWT_SECRET: ${JWT_SECRET:-change-in-production}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    depends_on:
      database:
        condition: service_healthy
    networks:
      - sportshop-net
    restart: always

  database:
    image: mysql:8.4
    container_name: database_sportshop_server
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-curso}
      MYSQL_DATABASE: sportshop
      TZ: Europe/Madrid
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sportshop-net
    restart: always

volumes:
  mysql_data:
    name: mysql_sportshop_server_data
    driver: local

networks:
  sportshop-net:
    name: sportshop_server_network
    driver: bridge