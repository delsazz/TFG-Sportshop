# Sportshop - Docker Compose para el servidor
# Uso: docker compose -f docker-compose.server.yml --env-file .env.production up -d --build
#
# Levanta: Frontend (React) + Admin (React) + Backend (Spring Boot) + Nginx (proxy) + MySQL

services:
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.server.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - frontend
      - admin
      - backend
      - database
    networks:
      - sportshop-net
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BASE: ${VITE_BASE:-/}
    expose:
      - "3000"
    networks:
      - sportshop-net
    restart: always

  admin:
    build:
      context: ./admin
      args:
        VITE_BASE: ${VITE_BASE_ADMIN:-/admin/}
    expose:
      - "3001"
    networks:
      - sportshop-net
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: DockerFile
    expose:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://database:3306/sportshop?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Madrid
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-curso}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-true}
      MAIL_SMTP_STARTTLS_REQUIRED: ${MAIL_SMTP_STARTTLS_REQUIRED:-true}
      NOTIFICATIONS_EMAIL_ENABLED: ${NOTIFICATIONS_EMAIL_ENABLED:-true}
      NOTIFICATIONS_EMAIL_FROM: ${NOTIFICATIONS_EMAIL_FROM:-}
    depends_on:
      database:
        condition: service_healthy
    networks:
      - sportshop-net
    restart: always

  database:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-curso}
      MYSQL_DATABASE: sportshop
      TZ: Europe/Madrid
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sportshop-net
    restart: always

volumes:
  mysql_data:

networks:
  sportshop-net:
    driver: bridge
